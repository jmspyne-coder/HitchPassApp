  .fchip.on{background:#1f3d2c;color:#faf6ec;border-color:#1f3d2c;}
  .q{width:100%;padding:11px 14px;border-radius:11px;border:1px solid rgba(31,28,23,.14);font-size:14px;outline:none;background:#fff;}

  .dlabel{font-size:11px;font-weight:700;letter-spacing:.06em;color:#867d6c;text-transform:uppercase;}

  #splash{position:fixed;inset:0;z-index:9999;background:#1f3d2c;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;transition:opacity .45s ease;padding:24px;}
  #splash .nm{font-family:'Playfair Display',Georgia,serif;color:#faf6ec;font-size:32px;font-weight:800;text-align:center;}
  #splash .sub{color:#e0875a;font-size:13px;font-weight:600;letter-spacing:.4px;}
  #splash .spin{margin-top:8px;width:26px;height:26px;border:3px solid rgba(255,255,255,.22);border-top-color:#e0875a;border-radius:50%;animation:spin .8s linear infinite;}
  #splash .disc{position:absolute;bottom:28px;left:0;right:0;text-align:center;color:rgba(255,255,255,.42);font-size:11px;font-weight:600;padding:0 24px;}

              h.indexOf("anthropic")>-1 || h.indexOf("sandbox")>-1 || h.indexOf("usercontent")>-1 ||
              /^\d+\.\d+\.\d+\.\d+$/.test(h);
    return bad ? "https://hitchpass.com" : location.origin + location.pathname;
  }
  function shareApp(){
    var url = prodURL();

    else if (navigator.clipboard){ navigator.clipboard.writeText(url); alert("Link copied: "+url); }
    else { alert(url); }

  /* ---- engine ---- */
  function cost(p){
    var n = NETWORKS[p.network];
    if (state.wallet.indexOf(p.network)===-1) return { tier:"locked", price:"Add this card", label:TIER.locked.label };
    if (p.priceOverride) return p.priceOverride;
    return { tier:n.tier, price:n.price, label:TIER[n.tier].label };
  }
  function pill(info){
    var s = TIER[info.tier];
    var lk = info.tier==="locked" ? ic("lock",11,s.fg) : "";
    return '<span style="background:'+s.bg+';color:'+s.fg+';font-weight:700;font-size:11.5px;padding:3px 9px;border-radius:999px;display:inline-flex;align-items:center;gap:5px">'+lk+info.label+' · '+esc(info.price)+'</span>';
  }
  function parkById(id){ for (var i=0;i<PARKS.length;i++){ if (PARKS[i].id===id) return PARKS[i]; } return null; }
  function fmtDate(d){ return d.toLocaleDateString(undefined,{ weekday:"short", month:"short", day:"numeric" }); }
  function nightsBetween(a,b){ if(!a||!b) return 0; return Math.round((new Date(b+"T00:00:00") - new Date(a+"T00:00:00"))/86400000); }
  function todayLocalStr(){ var d=new Date(); function z(n){ return (n<10?"0":"")+n; } return d.getFullYear()+"-"+z(d.getMonth()+1)+"-"+z(d.getDate()); }
  function bookingInfo(p, dateInStr){
    var net = NETWORKS[p.network];
    if (!net || !net.window || !dateInStr) return null;
    var arrival = new Date(dateInStr+"T00:00:00");
    var openDate = new Date(arrival.getTime() - net.window*86400000);
    var openIn = Math.ceil((openDate - new Date(new Date().toDateString()))/86400000);
    return { net:net, openDate:openDate, openIn:openIn, open:openIn<=0 };
  }
  function ensureTripIds(){ var ch=false; state.trips.forEach(function(t,i){ if(!t.id){ t.id=Date.now()+i; ch=true; } }); if(ch) persist(); }
  function tripById(id){ for(var i=0;i<state.trips.length;i++){ if(String(state.trips[i].id)===String(id)) return state.trips[i]; } return null; }

  function downloadReminder(p, dateInStr){
    if (!p) return;
    var net = NETWORKS[p.network]; if (!net || !net.window || !dateInStr) return;
    var arrival = new Date(dateInStr+"T00:00:00");
    var openDate = new Date(arrival.getTime() - net.window*86400000);
    function z(n){ return (n<10?"0":"")+n; }
    var ymd = openDate.getFullYear()+z(openDate.getMonth()+1)+z(openDate.getDate());
    var ics = "data:text/calendar;charset=utf8," + encodeURIComponent(
      ["BEGIN:VCALENDAR","VERSION:2.0","BEGIN:VEVENT","DTSTART;VALUE=DATE:"+ymd,"DTEND;VALUE=DATE:"+ymd,
       "SUMMARY:Book "+p.name+" ("+net.short+")",
       "DESCRIPTION:Your "+net.window+"-day booking window opens today. Reserve early—popular sites fill fast.",
       "END:VEVENT","END:VCALENDAR"].join("\n"));
    var a = document.createElement("a"); a.href = ics; a.download = "booking-reminder.ics";
    document.body.appendChild(a); a.click(); a.remove();
  }

          '<button class="btnP tap" data-act="remind" style="margin-top:10px">'+ic("bell",15,"#fff")+'Remind me '+fmtDate(openDate)+'</button></div>';
      } else {
        bw = '<div style="margin-top:12px;background:rgba(47,107,70,.10);border:1px solid '+C.green+';border-radius:13px;padding:12px 14px">'+
          '<div style="display:flex;align-items:center;gap:8px"><span style="color:'+C.green+'">'+ic("calendar",17,C.green)+'</span>'+
          '<span style="font-size:13.5px;font-weight:700">Booking window is open now</span></div>'+
          '<div style="font-size:12.5px;color:'+C.muted+';margin-top:5px;line-height:1.45">You’re inside '+esc(net.short)+'’s '+net.window+'-day window — reserve these dates before they fill.</div></div>';
      }
    }
    var stayWarn = overStay
      ? '<div style="margin-top:10px;display:flex;align-items:center;gap:6px;color:'+C.clay+';font-size:12.5px;font-weight:600">'+ic("alert",14,C.clay)+'These dates ('+nights+' nights) exceed '+esc(net.short)+'’s '+net.maxStay+'-night max stay.</div>'
      : "";

    var num = (state.profile.members && state.profile.members[p.network]) || "";
    var memBlock = num
      ? '<div style="margin-top:14px;font-size:13px"><span style="color:'+C.muted+'">Your '+esc(net.short)+' #: </span><b>'+esc(num)+'</b> <button class="tap" data-act="copynum" style="color:'+C.green+';font-weight:700;font-size:12.5px;margin-left:6px">Copy</button></div>'
      : '<div style="margin-top:14px;font-size:12px;color:'+C.muted+'">Add your '+esc(net.short)+' number in Profile for one-tap copy at booking.</div>';

    return head +
      '<div style="margin-top:14px;font-size:12.5px;color:'+C.muted+';font-weight:600">'+rules+'</div>'+
      '<div style="display:flex;gap:10px;margin-top:12px">'+
        '<div style="flex:1"><div class="dlabel">Arrival</div><input class="dinput" type="date" data-date="in" value="'+esc(state.dates.in)+'" /></div>'+
        '<div style="flex:1"><div class="dlabel">Departure</div><input class="dinput" type="date" data-date="out" value="'+esc(state.dates.out)+'" /></div>'+
      '</div>'+
      bw + stayWarn + memBlock +
      '<button class="btnG tap" data-act="addtrip" style="margin-top:14px">'+ic("calendar",15,"#faf6ec")+'Add to my trips</button>'+
      '<button class="btnO tap" data-act="reserve" style="margin-top:10px">Reserve on '+esc(net.short)+' '+ic("ext",13,C.pine)+'</button>'+
      '</div>' + note();
  }
  function note(){
    return '<div style="font-size:11.5px;color:'+C.muted+';text-align:center;padding:0 24px 14px;line-height:1.5">Listings are for reference — always confirm availability, price, and rules on the network’s site. Hitch Pass can’t book for you.</div>';
  }

  function stubView(name){
    return '<div style="padding:40px 24px;text-align:center;color:'+C.muted+'">'+
      '<div class="disp" style="font-size:22px;font-weight:800;color:'+C.ink+'">'+name+'</div>'+
      '<div style="font-size:13.5px;margin-top:8px;line-height:1.5">On the build queue. Validating earlier tabs first, then rebuilding this one against the spec.</div></div>';
  }

  function tripCard(t, past){
    var p = parkById(t.parkId); if (!p) return "";
    var net = NETWORKS[p.network];
    var ci = cost(p);
    var nights = nightsBetween(t.dateIn, t.dateOut);
    var dateLine = (t.dateIn && t.dateOut)
      ? fmtDate(new Date(t.dateIn+"T00:00:00"))+" → "+fmtDate(new Date(t.dateOut+"T00:00:00"))+" · "+nights+" night"+(nights===1?"":"s")
      : "";
    var bi = past ? null : bookingInfo(p, t.dateIn);
    var bw = "";
    if (bi){
      if (bi.openIn>0){
        bw = '<div style="margin-top:10px;display:flex;align-items:center;gap:10px;flex-wrap:wrap">'+
          '<span style="font-size:12px;font-weight:700;color:'+C.ember+';background:rgba(207,90,38,.10);padding:4px 10px;border-radius:999px">Books in '+bi.openIn+' day'+(bi.openIn===1?"":"s")+' · '+fmtDate(bi.openDate)+'</span>'+
          '<button class="tap" data-act="trip-remind" data-arg="'+t.id+'" style="font-size:12px;font-weight:700;color:'+C.green+';display:inline-flex;align-items:center;gap:4px">'+ic("bell",13,C.green)+'Remind</button></div>';
      } else {
        bw = '<div style="margin-top:10px"><span style="font-size:12px;font-weight:700;color:'+C.green+';background:rgba(47,107,70,.12);padding:4px 10px;border-radius:999px">Booking open now</span></div>';
      }
    }
    var stayWarn = (net.maxStay && nights>net.maxStay)
      ? '<div style="margin-top:8px;display:flex;align-items:center;gap:6px;color:'+C.clay+';font-size:12px;font-weight:600">'+ic("alert",13,C.clay)+nights+' nights exceeds '+esc(net.short)+'’s '+net.maxStay+'-night max.</div>'
      : "";
    return '<div class="tcard"'+(past?' style="opacity:.6"':'')+'>'+
      '<div style="display:flex;align-items:flex-start;gap:8px">'+
        '<div style="flex:1">'+
          '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">'+
            '<span class="disp" style="font-size:17px;font-weight:800">'+esc(p.name)+'</span>'+
            '<span style="font-size:10.5px;color:'+C.muted+';font-weight:700;background:#f0ebdd;padding:2px 7px;border-radius:6px">'+esc(net.short)+'</span>'+
          '</div>'+
          '<div style="font-size:12.5px;color:'+C.muted+';margin-top:2px">'+esc(p.city)+', '+esc(p.st)+'</div>'+
        '</div>'+pill(ci)+
      '</div>'+
      (dateLine? '<div style="font-size:13px;font-weight:600;margin-top:9px;display:flex;align-items:center;gap:6px">'+ic("calendar",14,C.pine)+esc(dateLine)+'</div>':'')+
      bw + stayWarn +
      '<div style="display:flex;gap:8px;margin-top:12px">'+
        '<button class="btnO tap" data-act="trip-view" data-arg="'+t.id+'" style="flex:1">View park</button>'+
        '<button class="tap" data-act="trip-remove" data-arg="'+t.id+'" style="padding:11px 14px;border-radius:11px;border:1px solid rgba(168,71,47,.3);color:'+C.clay+';font-weight:700;font-size:13px">Remove</button>'+
      '</div></div>';
  }

  function tripsView(){
    ensureTripIds();
    var today = todayLocalStr();
    var trips = state.trips.slice().sort(function(a,b){ return (a.dateIn||"").localeCompare(b.dateIn||""); });
    var head = '<div style="padding:16px 16px 6px"><div class="disp" style="font-size:24px;font-weight:800">Trips</div>';
    if (!trips.length){
      return head + '<div style="font-size:12.5px;color:'+C.muted+'">Your saved stays and booking windows</div></div>'+
        '<div style="padding:30px 24px;text-align:center;color:'+C.muted+'">'+ic("calendar",34,"#cdbfa6")+
        '<div style="font-size:15px;font-weight:700;color:'+C.ink+';margin-top:10px">No trips saved yet</div>'+
        '<div style="font-size:13px;margin-top:6px;line-height:1.5">Find a park in Explore, pick your dates, and tap “Add to my trips” to track its booking window here.</div>'+
        '<button class="btnG tap" data-act="nav" data-arg="explore" style="margin:16px auto 0;max-width:220px">Explore parks</button></div>';
    }
    var upcoming = trips.filter(function(t){ return !t.dateOut || t.dateOut>=today; });
    var past = trips.filter(function(t){ return t.dateOut && t.dateOut<today; });
    var html = head + '<div style="font-size:12.5px;color:'+C.muted+';margin-bottom:6px">'+trips.length+' saved · booking windows tracked</div></div>'+
      '<div style="padding:6px 16px 8px">';
    html += upcoming.map(function(t){ return tripCard(t,false); }).join("");
    if (past.length){ html += '<div class="dlabel" style="margin:14px 2px 8px">Past</div>'+past.map(function(t){ return tripCard(t,true); }).join(""); }
    html += '</div>';
    return html;
  }

  function inputRow(attr, key, label, type, val, ph){
    return '<div style="margin-top:12px"><div class="dlabel">'+label+'</div>'+
      '<input class="dinput" '+attr+'="'+key+'" type="'+type+'" value="'+esc(val||"")+'" placeholder="'+esc(ph)+'" autocomplete="off" autocapitalize="words" /></div>';
  }

  function profileView(){
    var prof = state.profile;
    return ''+
      '<div style="padding:16px 16px 6px">'+
        '<div class="disp" style="font-size:24px;font-weight:800">Profile</div>'+
        '<div style="font-size:12.5px;color:'+C.muted+'">Your details and referral setup</div>'+
      '</div>'+
      '<div class="det">'+
        '<div class="dlabel" style="font-size:12px">Referral setup</div>'+
        '<div style="font-size:12.5px;color:'+C.muted+';margin-top:5px;line-height:1.5">Saved on this device. Used to pre-write referral texts from you to your salesperson.</div>'+
        inputRow("data-profile","fullName","Your name","text",prof.fullName,"Your full name")+
        inputRow("data-profile","salesName","Salesperson name","text",prof.salesName,"e.g. Chris Rivera")+
        inputRow("data-profile","salesPhone","Salesperson mobile","tel",prof.salesPhone,"(555) 123-4567")+
      '</div>';
  }

  /* Build the SMS deep link addressed to the salesperson, prefilled in first
     person as the account holder. Returns null if required fields are missing. */
  function buildReferralSMS(){
    var prof = state.profile, r = state.refer;
    var sales = prof.salesPhone ? String(prof.salesPhone).replace(/[^\d+]/g,"") : "";
    var friendName = (r.friendName||"").trim();
    var friendPhone = (r.friendPhone||"").trim();
    if (!sales || !friendName || !friendPhone) return null;
    var salesName = (prof.salesName||"there").trim();
    var yourName = (prof.fullName||"").trim();
    var friendEmail = (r.friendEmail||"").trim();
    var intro = yourName ? ("Hey "+salesName+", it's "+yourName+".") : ("Hey "+salesName+".");
    var body = intro+" I'm referring a friend — "+friendName+". Their number is "+friendPhone+
      (friendEmail ? " and email is "+friendEmail : "")+
      ". They're expecting you to reach out. Thanks!";
    return "sms:"+sales+"?&body="+encodeURIComponent(body);
  }

  function referCanSend(){
    var r = state.refer;
    var hasSales = !!(state.profile.salesPhone && String(state.profile.salesPhone).trim());
    return hasSales && !!(r.friendName||"").trim() && !!(r.friendPhone||"").trim();
  }
  function updateReferBtn(){
    var b = document.getElementById("sendReferral"); if (!b) return;
    var can = referCanSend();
    b.disabled = !can;
    b.style.opacity = can ? "1" : ".45";
    b.style.pointerEvents = can ? "auto" : "none";
  }

  function referView(){
    var prof = state.profile, r = state.refer;
    var hasSales = !!(prof.salesPhone && String(prof.salesPhone).trim());
    var head =
      '<div style="padding:16px 16px 6px">'+
        '<div class="disp" style="font-size:24px;font-weight:800">Refer a friend</div>'+
        '<div style="font-size:12.5px;color:'+C.muted+'">Send to your agent</div>'+
      '</div>';

    if (!hasSales){
      return head +
        '<button class="det tap" data-act="nav" data-arg="profile" style="display:block;text-align:left;cursor:pointer">'+
          '<div style="display:flex;align-items:flex-start;gap:10px">'+
            '<span style="color:'+C.ember+';flex-shrink:0;margin-top:1px">'+ic("alert",18,C.ember)+'</span>'+
            '<div style="font-size:14px;font-weight:700;color:'+C.ink+';line-height:1.45">Add your salesperson’s info in Profile first'+
              '<div style="font-size:12.5px;font-weight:500;color:'+C.muted+';margin-top:4px">We text the referral straight to them from your phone.</div></div>'+
            '<span style="margin-left:auto;align-self:center">'+ic("chevron",18,C.muted)+'</span>'+
          '</div>'+
        '</button>';
    }

    var can = referCanSend();
    return head +
      '<div class="det">'+
        '<div style="font-size:12.5px;color:'+C.muted+';line-height:1.5;margin-bottom:4px">Fill in your friend’s details — hand them your phone for this part if you like. The text sends from your number to '+esc((prof.salesName||"your salesperson").trim())+'.</div>'+
        inputRow("data-refer","friendName","Friend’s name","text",r.friendName,"Jane Camper")+
        inputRow("data-refer","friendPhone","Friend’s mobile","tel",r.friendPhone,"(555) 123-4567")+
        inputRow("data-refer","friendEmail","Friend’s email (optional)","email",r.friendEmail,"jane@email.com")+
        '<button id="sendReferral" class="btnP tap" data-act="send-referral" style="margin-top:16px'+(can?"":";opacity:.45;pointer-events:none")+'"'+(can?"":" disabled")+'>'+ic("share",15,"#fff")+'Send referral text</button>'+
        '<div style="font-size:11.5px;color:'+C.muted+';text-align:center;margin-top:10px;line-height:1.5">Opens your Messages app with the note pre-written — you review, then hit send.</div>'+
      '</div>';
  }

  function navView(){
    return '<div class="nav">'+NAV.map(function(n){
      var on = (state.tab===n[0] || (n[0]==="explore" && state.tab==="explore")) ? " on" : "";
      return '<button class="navBtn tap'+on+'" data-act="nav" data-arg="'+n[0]+'">'+ic(n[2],21)+'<span>'+n[1]+'</span></button>';
    }).join("")+'</div>';
  }

  function gateView(){
    return '<div id="gate">'+ic("tent",42,"#e0875a")+
      '<div class="disp" style="color:#faf6ec;font-size:26px;font-weight:800">Hitch Pass</div>'+
      '<div style="color:#a9bdab;font-size:13px;margin-top:-8px">Enter passcode to continue</div>'+
      '<input id="pc" type="password" placeholder="Passcode" autocomplete="off" />'+
      '<div id="pcerr" style="color:#f0a070;font-size:12.5px;display:none">Incorrect passcode</div>'+
      '<button class="btn tap" data-act="unlock">Enter</button>'+
      '<div style="position:absolute;bottom:26px;color:rgba(255,255,255,.4);font-size:11px;font-weight:600;text-align:center;padding:0 24px">Unofficial · made by a customer, not the company</div></div>';
  }

  function render(){
    var app = document.getElementById("app");
    if (!state.unlocked){ app.innerHTML = gateView(); var pc=document.getElementById("pc"); if(pc) pc.focus(); return; }
    var body;
    if (state.tab==="explore"){ body = state.selected ? detailView() : exploreView(); }
    else if (state.tab==="home"){ body = homeView(); }
    else if (state.tab==="tools"){ body = stubView("Coverage &amp; savings"); }
    else if (state.tab==="trips"){ body = tripsView(); }
    else if (state.tab==="refer"){ body = referView(); }
    else if (state.tab==="profile"){ body = profileView(); }
    else if (state.tab==="perks"){ body = stubView("Perks"); }
    else { body = homeView(); }
    app.innerHTML = '<div class="wrap">'+
      '<div class="ribbon">'+ic("alert",14,"#e0875a")+'<span>Unofficial · made by a customer, not by Thousand Trails / Encore / ELS · all names are trademarks of their owners</span></div>'+
      '<div class="content">'+body+'</div>'+
      '<div class="footer">Unofficial · made by a customer, not the company</div>'+
      navView()+
    '</div>';
  }

  function tryUnlock(){
    var i = document.getElementById("pc");
    if (i && i.value.trim().toLowerCase()===PASSCODE){ state.unlocked=true; persist(); render(); }
    else { var e=document.getElementById("pcerr"); if(e) e.style.display="block"; if(i){ i.value=""; i.focus(); } }
  }

  /* ---- events ---- */
  document.addEventListener("click", function(e){
    var el = e.target.closest ? e.target.closest("[data-act]") : null;
    if (!el) return;
    var act = el.getAttribute("data-act");
    var arg = el.getAttribute("data-arg");
    if (act==="nav"){
      if (arg==="explorefree"){ state.tab="explore"; state.selected=null; state.freeOnly=true; }
      else if (arg==="explore"){ state.tab="explore"; state.selected=null; }
      else { state.tab=arg; state.selected=null; }
      render();
    }
    else if (act==="share"){ shareApp(); }
    else if (act==="unlock"){ tryUnlock(); }
    else if (act==="park"){ state.selected=parseInt(arg,10); state.dates={in:"",out:""}; render(); }
    else if (act==="back"){ state.selected=null; render(); }
    else if (act==="netfilter"){ state.netFilter=arg; render(); }
    else if (act==="freeonly"){ state.freeOnly=!state.freeOnly; render(); }
    else if (act==="remind"){ downloadReminder(parkById(state.selected), state.dates.in); }
    else if (act==="reserve"){ var pp=parkById(state.selected); if(pp){ window.open(NETWORKS[pp.network].url,"_blank"); } }
    else if (act==="copynum"){ var pp2=parkById(state.selected); var nm=pp2 && state.profile.members[pp2.network]; if(nm && navigator.clipboard){ navigator.clipboard.writeText(nm); alert("Copied: "+nm); } }
    else if (act==="addtrip"){
      var pk=parkById(state.selected);
      if (!pk) return;
      if (!state.dates.in || !state.dates.out){ alert("Pick your arrival and departure dates first."); return; }
      state.trips.push({ id:Date.now(), parkId:pk.id, dateIn:state.dates.in, dateOut:state.dates.out, network:pk.network });
      persist();
      state.tab="trips"; state.selected=null; render();
    }
    else if (act==="send-referral"){ var su=buildReferralSMS(); if(su){ window.location.href=su; } }
    else if (act==="trip-view"){ var tv=tripById(arg); if(tv){ state.tab="explore"; state.selected=tv.parkId; state.dates={in:tv.dateIn||"",out:tv.dateOut||""}; render(); } }
    else if (act==="trip-remind"){ var tr=tripById(arg); if(tr){ downloadReminder(parkById(tr.parkId), tr.dateIn); } }
    else if (act==="trip-remove"){
      var trm=tripById(arg);
      var pnm = (trm && parkById(trm.parkId)) ? parkById(trm.parkId).name : "this trip";
      if (trm && confirm("Remove "+pnm+" from your trips?")){ state.trips=state.trips.filter(function(x){ return String(x.id)!==String(arg); }); persist(); render(); }
    }
  });
  document.addEventListener("input", function(e){
    var t = e.target; if (!t || !t.getAttribute) return;
    if (t.id==="q"){ state.q=t.value; var l=document.getElementById("plist"); if(l) l.innerHTML=listHTML(); return; }
    var rk = t.getAttribute("data-refer");
    if (rk){ state.refer[rk]=t.value; updateReferBtn(); return; }
    var pk = t.getAttribute("data-profile");
    if (pk){ state.profile[pk]=t.value; persist(); return; }
  });
  document.addEventListener("change", function(e){
    var d = e.target && e.target.getAttribute ? e.target.getAttribute("data-date") : null;
    if (d){ state.dates[d]=e.target.value; render(); }
  });
  document.addEventListener("keydown", function(e){
    if (e.key==="Enter" && !state.unlocked){ tryUnlock(); }
  });

  render();
  var sp = document.getElementById("splash");
  if (sp){ sp.style.opacity="0"; setTimeout(function(){ if(sp.parentNode) sp.parentNode.removeChild(sp); }, 480); }
})();
</script>
</body>
</html>
