  .navBtn.on{color:#cf5a26;font-weight:700;}
  .hero{background:#1f3d2c;padding:22px 18px 26px;border-bottom-left-radius:22px;border-bottom-right-radius:22px;}
  .chip{background:rgba(255,255,255,.12);color:#f3ead9;font-size:11.5px;font-weight:700;padding:3px 9px;border-radius:999px;}
  .stat{background:rgba(255,255,255,.07);border-radius:14px;padding:14px 16px;}
  .tile{text-align:left;background:#fff;border:1px solid rgba(31,28,23,.10);border-radius:16px;padding:16px;display:flex;flex-direction:column;gap:14px;width:100%;}
  .tileIc{width:46px;height:46px;border-radius:12px;display:grid;place-items:center;}
  .pcard{text-align:left;width:100%;background:#fff;border:1px solid rgba(31,28,23,.10);border-radius:14px;padding:14px;margin-bottom:10px;display:flex;gap:10px;align-items:center;}

  .fchip{font-size:12px;font-weight:700;padding:6px 12px;border-radius:999px;border:1px solid rgba(31,28,23,.14);color:#5b5446;background:#fff;}
  .fchip.on{background:#1f3d2c;color:#faf6ec;border-color:#1f3d2c;}
  .q{width:100%;padding:11px 14px;border-radius:11px;border:1px solid rgba(31,28,23,.14);font-size:14px;outline:none;background:#fff;}
  .det{background:#fff;border:1px solid rgba(31,28,23,.10);border-radius:16px;padding:16px;margin:0 16px 14px;}
  .dlabel{font-size:11px;font-weight:700;letter-spacing:.06em;color:#867d6c;text-transform:uppercase;}
  .dinput{width:100%;padding:10px 12px;border-radius:10px;border:1px solid rgba(31,28,23,.16);font-size:14px;outline:none;background:#fff;margin-top:5px;}
  .btnP{width:100%;padding:12px;border-radius:11px;background:#cf5a26;color:#fff;font-weight:700;font-size:14px;display:flex;align-items:center;justify-content:center;gap:7px;}

  var EXPLORE_PER_PAGE = 24;

  /* All non-region axes (network, $0-only, search). Region is applied separately so chip counts can
     reflect "results within the current network selection" independent of the region choice. */
  function passesNonRegion(p, q){
    if (state.netFilter && p.network!==state.netFilter) return false;
    if (state.freeOnly && cost(p).tier!=="included") return false;
    if (q){ if ((p.name+" "+p.city+" "+p.st).toLowerCase().indexOf(q)===-1) return false; }
    return true;
  }
  function filteredParks(){
    var q = state.q.trim().toLowerCase();
    var hasReg = state.regionFilter.size>0;
    return PARKS.filter(function(p){
      if (state.favOnly && !isFav(p.id)) return false;
      if (!passesNonRegion(p,q)) return false;
      if (hasReg && !state.regionFilter.has(regionOf(p))) return false;   // region: independent geographic AND axis
      return true;
    });
  }
  /* Per-region live counts within the current non-region selection (drives chip labels + 0-hiding). */
  function regionCounts(){
    var q = state.q.trim().toLowerCase(), m = {};
    PARKS.forEach(function(p){ if (passesNonRegion(p,q)){ var r=regionOf(p); m[r]=(m[r]||0)+1; } });
    return m;
  }
  function hasCoord(p){ return typeof p.lat==="number" && typeof p.lng==="number"; }

  function parkCardHTML(p){
    var net = NETWORKS[p.network];
    var rig = state.profile.rigLength;
    var tags = pill(cost(p));
    if (p.highUse) tags += ' <span style="font-size:11px;font-weight:700;color:'+C.ember+';background:rgba(207,90,38,.10);padding:3px 8px;border-radius:999px">Books fast</span>';
    if (rig && p.maxRig && rig>p.maxRig) tags += ' <span style="font-size:11px;font-weight:700;color:'+C.clay+';background:rgba(168,71,47,.12);padding:3px 8px;border-radius:999px">Rig too long</span>';
    return '<button class="pcard tap" data-act="park" data-arg="'+p.id+'">'+
      '<div style="flex:1">'+
        '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">'+
          '<span class="disp" style="font-size:17px;font-weight:800">'+esc(p.name)+'</span>'+
          '<span style="font-size:10.5px;color:'+C.muted+';font-weight:700;background:#f0ebdd;padding:2px 7px;border-radius:6px">'+esc(net.short)+'</span>'+
        '</div>'+
        '<div style="font-size:12.5px;color:'+C.muted+';margin-top:2px">'+(p.city?esc(p.city)+', ':'')+esc(p.st)+' · '+esc(regionOf(p))+'</div>'+
        '<div style="margin-top:9px;display:flex;gap:6px;flex-wrap:wrap;align-items:center">'+tags+'</div>'+
      '</div>'+
      '<span class="tap" data-act="fav-toggle" data-arg="'+p.id+'" style="font-size:20px;line-height:1;padding:4px 6px;color:'+(isFav(p.id)?C.ember:"rgba(31,28,23,.28)")+'">'+(isFav(p.id)?"★":"☆")+'</span>'+
      ic("chevron",18,C.muted)+'</button>';
  }

  function listHTML(){
    var ps = filteredParks();
    if (!ps.length) return '<div style="padding:26px;text-align:center;color:'+C.muted+';font-size:13.5px">No parks match.</div>';
    var pages = Math.max(1, Math.ceil(ps.length/EXPLORE_PER_PAGE));
    if (state.explorePage>pages) state.explorePage=pages;
    if (state.explorePage<1) state.explorePage=1;
    var start = (state.explorePage-1)*EXPLORE_PER_PAGE;
    var pageItems = ps.slice(start, start+EXPLORE_PER_PAGE);
    var cards = pageItems.map(parkCardHTML).join("");
    var pager = "";
    if (pages>1){
      var prevDis = state.explorePage<=1, nextDis = state.explorePage>=pages;
      function pBtn(dir,label,dis){
        return '<button class="tap" data-act="explore-page" data-arg="'+dir+'"'+(dis?" disabled":"")+
          ' style="padding:10px 16px;border-radius:11px;border:1px solid rgba(31,28,23,.16);background:#fff;font-weight:700;font-size:13.5px;color:'+C.pine+(dis?";opacity:.4;pointer-events:none":"")+'">'+label+'</button>';
      }
      pager = '<div style="display:flex;align-items:center;justify-content:space-between;gap:10px;padding:14px 2px 6px">'+
        pBtn("prev","‹ Prev",prevDis)+
        '<span style="font-size:12.5px;font-weight:700;color:'+C.muted+'">Page '+state.explorePage+' of '+pages+'</span>'+
        pBtn("next","Next ›",nextDis)+'</div>';
    }
    return cards + pager;
  }

  function modeBtn(m,label){
    var on = state.exploreMode===m;
    return '<button class="tap" data-act="explore-mode" data-arg="'+m+'" style="flex:1;padding:8px;border-radius:9px;border:none;font-weight:700;font-size:13px;'+(on?"background:"+C.pine+";color:#faf6ec":"background:transparent;color:#5b5446")+'">'+label+'</button>';
  }
  function mapNoteInner(){
    var n = filteredParks().filter(function(p){ return !hasCoord(p); }).length;
    return n ? '<div style="font-size:12px;color:'+C.muted+';padding:8px 16px 4px;text-align:center;line-height:1.5">'+n+' resort'+(n===1?"":"s")+' not shown — location data coming</div>' : "";
  }
  function mapNoteHTML(){ return '<div id="mapNote">'+mapNoteInner()+'</div>'; }
  function updateMapNote(){ var el=document.getElementById("mapNote"); if(el) el.innerHTML=mapNoteInner(); }

  function exploreView(){
    var present = {}; PARKS.forEach(function(p){ present[p.network]=true; });
    var chips = '<button class="fchip tap'+(state.netFilter===""?" on":"")+'" data-act="netfilter" data-arg="">All</button>';
    Object.keys(NETWORKS).forEach(function(id){ if (present[id] && !NETWORKS[id].cardOnly) chips += '<button class="fchip tap'+(state.netFilter===id?" on":"")+'" data-act="netfilter" data-arg="'+id+'">'+esc(NETWORKS[id].short)+'</button>'; });
    var freeChip = '<button class="fchip tap'+(state.freeOnly?" on":"")+'" data-act="freeonly">$0 in my wallet</button>';
    var favChip = '<button class="fchip tap'+(state.favOnly?" on":"")+'" data-act="favonly">★ Saved</button>';
    // Region chips: REGION_ORDER, live count within current network selection, 0-count regions hidden.
    var rc = regionCounts();
    var regionChips = '<button class="fchip tap'+(state.regionFilter.size===0?" on":"")+'" data-act="regionall">All regions</button>';
    REGION_ORDER.forEach(function(r){
      var n = rc[r]||0; if (!n) return;   // hide regions with no parks under the current network filter
      regionChips += '<button class="fchip tap'+(state.regionFilter.has(r)?" on":"")+'" data-act="regionfilter" data-arg="'+esc(r)+'">'+esc(r)+' '+n+'</button>';
    });
    var regionRow = '<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px">'+regionChips+'</div>';
    var toggle = '<div style="display:flex;gap:4px;margin-top:11px;background:#e6dfd0;border-radius:11px;padding:3px">'+modeBtn("list","List")+modeBtn("map","Map")+'</div>';
    var body = state.exploreMode==="map"
      ? mapNoteHTML()+'<div id="mapHost" style="height:60vh;margin:6px 16px 16px;border-radius:14px;overflow:hidden;border:1px solid rgba(31,28,23,.12);background:#dfe6df"></div>'
      : '<div id="plist" style="padding:8px 16px 8px">'+listHTML()+'</div>';
    return ''+
      '<div style="padding:16px 16px 6px">'+
        '<div class="disp" style="font-size:24px;font-weight:800">Explore</div>'+
        '<div style="font-size:12.5px;color:'+C.muted+';margin-bottom:12px">Everywhere your wallet can take you</div>'+
        '<input id="q" class="q" placeholder="Search parks or cities" value="'+esc(state.q)+'" />'+
        '<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:11px">'+chips+freeChip+favChip+'</div>'+
        regionRow+
        toggle+
      '</div>'+ body;
  }

  /* ---- Explore map (Leaflet + Leaflet.markercluster, lazy-loaded from CDN, online-only) ---- */
  function addMapCss(id, href){
    if (document.getElementById(id)) return;
    var lk=document.createElement("link"); lk.id=id; lk.rel="stylesheet"; lk.href=href; document.head.appendChild(lk);
  }
  function clusterReady(){ return typeof L!=="undefined" && typeof L.markerClusterGroup==="function"; }
  function ensureLeaflet(cb){
    if (clusterReady()){ cb(); return; }
    addMapCss("leaflet-css","https://unpkg.com/leaflet@1.9.4/dist/leaflet.css");
    addMapCss("mcluster-css","https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css");
    addMapCss("mcluster-css-def","https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css");
    /* markercluster (1.5.x, Leaflet-1.x compatible) must load AFTER Leaflet core. */
    function loadCluster(){
      if (typeof L.markerClusterGroup==="function"){ cb(); return; }
      var mc=document.getElementById("mcluster-js");
      if (!mc){
        mc=document.createElement("script"); mc.id="mcluster-js";
        mc.src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js";
        mc.onload=function(){ cb(); };
        mc.onerror=function(){ cb(); };   // degrade to un-clustered markers (initExploreMap checks)
        document.head.appendChild(mc);
      } else {
        var iv2=setInterval(function(){ if(typeof L.markerClusterGroup==="function"){ clearInterval(iv2); cb(); } }, 60);
      }
    }
    var sc=document.getElementById("leaflet-js");
    if (!sc){
      sc=document.createElement("script"); sc.id="leaflet-js"; sc.src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js";
      sc.onload=function(){ loadCluster(); };
      sc.onerror=function(){ var h=document.getElementById("mapHost"); if(h) h.innerHTML='<div style="padding:30px 20px;text-align:center;color:'+C.muted+';font-size:13.5px">Map needs a connection. Switch to List to browse offline.</div>'; };
      document.head.appendChild(sc);
    } else {
      var iv=setInterval(function(){ if(typeof L!=="undefined"){ clearInterval(iv); loadCluster(); } }, 60);
    }
  }
  function teardownMap(){ if (mapInstance){ try{ mapInstance.remove(); }catch(e){} mapInstance=null; } }
  function initExploreMap(){
    ensureLeaflet(function(){
      var host=document.getElementById("mapHost"); if(!host || typeof L==="undefined") return;
      teardownMap();
      mapInstance=L.map(host,{ zoomControl:true, attributionControl:true });
      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{ maxZoom:18, attribution:"© OpenStreetMap" }).addTo(mapInstance);
      var pts=filteredParks().filter(hasCoord);
      if (pts.length){
        var bounds=[], present={};
        // Cluster overlapping pins; rebuilt from the CURRENT filtered set on every render.
        // Falls back to direct markers if the plugin didn't load (offline first run, etc.).
        var cluster = (typeof L.markerClusterGroup==="function")
          ? L.markerClusterGroup({ showCoverageOnHover:false, spiderfyOnMaxZoom:true, chunkedLoading:true, maxClusterRadius:50 })
          : null;
        pts.forEach(function(p){
          var nw=NETWORKS[p.network]||{}, col=nw.color||C.ember;
          present[p.network]=true;
          var m=L.circleMarker([p.lat,p.lng],{ radius:6, weight:2, color:"#fff", fillColor:col, fillOpacity:.95 });
          m.bindPopup('<div style="min-width:150px"><div class="disp" style="font-weight:800;font-size:14px">'+esc(p.name)+'</div>'+
            '<div style="font-size:12px;color:#867d6c;margin:2px 0 8px">'+(p.city?esc(p.city)+', ':'')+esc(p.st)+' · '+esc(nw.short||p.network)+'</div>'+
            '<button type="button" data-mappark="'+p.id+'" style="background:'+C.ember+';color:#fff;border:none;border-radius:8px;padding:7px 12px;font-weight:700;font-size:12.5px;cursor:pointer">Open details ›</button></div>');
          if (cluster) cluster.addLayer(m); else m.addTo(mapInstance);
          bounds.push([p.lat,p.lng]);
        });
        if (cluster) mapInstance.addLayer(cluster);
        mapInstance.fitBounds(bounds,{ padding:[28,28], maxZoom:9 });
        // legend — one entry per network present in the current view
        var legend=L.control({ position:"bottomright" });
        legend.onAdd=function(){
          var d=L.DomUtil.create("div");
          d.style.cssText="background:rgba(255,255,255,.92);padding:7px 9px;border-radius:9px;font:600 11.5px system-ui,sans-serif;color:#5b5446;box-shadow:0 1px 4px rgba(0,0,0,.2);line-height:1.7";
          d.innerHTML=Object.keys(NETWORKS).filter(function(id){ return present[id]; }).map(function(id){
            var nw=NETWORKS[id];
            return '<div style="display:flex;align-items:center;gap:6px"><span style="width:11px;height:11px;border-radius:50%;background:'+(nw.color||C.ember)+';border:2px solid #fff;box-shadow:0 0 0 1px rgba(0,0,0,.15);display:inline-block"></span>'+esc(nw.name)+'</div>';
          }).join("");
          return d;
        };
        legend.addTo(mapInstance);
      } else {
        mapInstance.setView([39.5,-98.35], 3);   // continental US, no pins in this filter
      }
      mapInstance.on("popupopen", function(e){
        var node=e.popup.getElement(); if(!node) return;
        var btn=node.querySelector("[data-mappark]"); if(!btn) return;
        btn.onclick=function(){ state.selected=parseInt(btn.getAttribute("data-mappark"),10); state.dates={in:"",out:""}; render(); };
      });
      setTimeout(function(){ if(mapInstance) mapInstance.invalidateSize(); }, 0);
    });
  }

  function detailView(){
    var p = parkById(state.selected);
    if (!p){ state.selected=null; return exploreView(); }
    var net = NETWORKS[p.network];
    var eb = effectiveBooking(p);
    var ci = cost(p);
    var locked = ci.tier==="locked";
    var head =
      '<button class="tap" data-act="back" style="display:flex;align-items:center;gap:6px;color:'+C.muted+';font-weight:600;font-size:13.5px;padding:14px 16px 4px">'+ic("back",18,C.muted)+'Back to parks</button>'+
      '<div class="det">'+
        '<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px">'+
          '<div><div class="disp" style="font-size:23px;font-weight:800;line-height:1.1">'+esc(p.name)+'</div>'+
          '<div style="font-size:13px;color:'+C.muted+';margin-top:3px">'+(p.city?esc(p.city)+', ':'')+esc(p.st)+' · '+esc(regionOf(p))+' · '+esc(net.name)+'</div></div>'+
        '</div>'+
        '<div style="margin-top:10px">'+pill(ci)+'</div>';

    if (locked){
      var accName = (NETWORKS[accessKey(p)] || net).name;
      return head +
        '<div style="margin-top:14px;font-size:13.5px;color:'+C.muted+';line-height:1.5">You don’t hold <b>'+esc(accName)+'</b> in your wallet. Add it in Profile to see your rate, booking window, and reserve here.</div>'+
        '<button class="btnG tap" data-act="nav" data-arg="profile" style="margin-top:14px">Manage my wallet</button>'+
        '</div>'+ note();
    }

    var arrival = state.dates.in ? new Date(state.dates.in+"T00:00:00") : null;
    var openDate = (arrival && eb.window) ? new Date(arrival.getTime() - eb.window*86400000) : null;
    var openIn = openDate ? Math.ceil((openDate - new Date(new Date().toDateString()))/86400000) : null;
    var nights = (state.dates.in && state.dates.out) ? Math.round((new Date(state.dates.out+"T00:00:00") - arrival)/86400000) : 0;
    var overStay = eb.maxDaysIn && nights>eb.maxDaysIn;

    // tier-aware stay phrasing: park-to-park tiers move between parks; camping has a days-in/days-out cycle
    var stayDesc = eb.tierAware
      ? (eb.parkToPark ? eb.maxDaysIn+' days, move park-to-park' : eb.maxDaysIn+' days in / '+eb.daysOut+' days out')
      : 'up to '+eb.maxDaysIn+' nights';
    var tierNote = eb.tierAware ? ' · at your '+esc(perksTierLabel(eb.tierKey))+' tier' : '';
    var rules = eb.window
      ? esc(net.short)+': '+stayDesc+' · book up to '+eb.window+' days out'+tierNote
      : esc(net.short)+': no fixed booking window';

    var bw = "";
    if (eb.window && arrival && openIn!==null){
      if (openIn>0){
        bw = '<div style="margin-top:12px;background:rgba(207,90,38,.08);border:1px solid '+C.ember+';border-radius:13px;padding:12px 14px">'+
          '<div style="display:flex;align-items:center;gap:8px"><span style="color:'+C.ember+'">'+ic("calendar",17,C.ember)+'</span>'+
          '<span style="font-size:13.5px;font-weight:700">Booking opens in '+openIn+' day'+(openIn===1?"":"s")+'</span></div>'+
          '<div style="font-size:12.5px;color:'+C.muted+';margin-top:5px;line-height:1.45">'+esc(net.short)+'’s '+eb.window+'-day window for these dates opens '+fmtDate(openDate)+'. Popular parks book out the morning it opens — set a reminder.</div>'+
          '<button class="btnP tap" data-act="remind" style="margin-top:10px">'+ic("bell",15,"#fff")+'Remind me '+fmtDate(openDate)+'</button></div>';
      } else {
        bw = '<div style="margin-top:12px;background:rgba(47,107,70,.10);border:1px solid '+C.green+';border-radius:13px;padding:12px 14px">'+
          '<div style="display:flex;align-items:center;gap:8px"><span style="color:'+C.green+'">'+ic("calendar",17,C.green)+'</span>'+
          '<span style="font-size:13.5px;font-weight:700">Booking window is open now</span></div>'+
          '<div style="font-size:12.5px;color:'+C.muted+';margin-top:5px;line-height:1.45">You’re inside '+esc(net.short)+'’s '+eb.window+'-day window — reserve these dates before they fill.</div></div>';
      }
    }
    var stayWarn = overStay
      ? '<div style="margin-top:10px;display:flex;align-items:center;gap:6px;color:'+C.clay+';font-size:12.5px;font-weight:600">'+ic("alert",14,C.clay)+'These dates ('+nights+' nights) exceed '+esc(net.short)+'’s '+eb.maxDaysIn+'-night max stay.</div>'
      : "";
    if (!isPro()){ bw = ""; stayWarn = ""; }   // Pro-only: booking-window + max-stay alerts (Fix 4 surface 2). Free sees dates only.
    // Hard guard (live): departure must be after arrival. Blocks Add (handled in the addtrip action).
    var dateErr = (state.dates.in && state.dates.out && nights<1)
      ? '<div style="margin-top:10px;display:flex;align-items:center;gap:6px;color:'+C.clay+';font-size:12.5px;font-weight:700">'+ic("alert",14,C.clay)+'Departure must be after arrival.</div>'
      : "";

    var num = (state.profile.members && state.profile.members[p.network]) || "";
    var memBlock = !isPro()
      ? lockedInline("Member numbers + one-tap copy are a Pro feature.")   // Fix 4 surface 3
      : (num
        ? '<div style="margin-top:14px;font-size:13px"><span style="color:'+C.muted+'">Your '+esc(net.short)+' #: </span><b>'+esc(num)+'</b> <button class="tap" data-act="copynum" style="color:'+C.green+';font-weight:700;font-size:12.5px;margin-left:6px">Copy</button></div>'
        : '<div style="margin-top:14px;font-size:12px;color:'+C.muted+'">Add your '+esc(net.short)+' number in Profile for one-tap copy at booking.</div>');

    return head +
      '<div style="margin-top:14px;font-size:12.5px;color:'+C.muted+';font-weight:600">'+rules+'</div>'+
      '<div style="display:flex;gap:10px;margin-top:12px">'+
        '<div style="flex:1"><div class="dlabel">Arrival</div><input class="dinput" type="date" data-date="in" value="'+esc(state.dates.in)+'" /></div>'+
        '<div style="flex:1"><div class="dlabel">Departure</div><input class="dinput" type="date" data-date="out" value="'+esc(state.dates.out)+'" /></div>'+
      '</div>'+
      bw + stayWarn + dateErr + memBlock +
      '<button class="btnG tap" data-act="addtrip" style="margin-top:14px">'+ic("calendar",15,"#faf6ec")+'Add to my trips</button>'+

  function tripCard(t, past){
    var p = parkById(t.parkId);
    if (!p && !t.parkName) return "";           // orphan with no fallback name — drop (legacy behavior)
    var name = p ? p.name : (t.parkName || "Saved trip");
    var net = NETWORKS[t.network] || (p ? NETWORKS[p.network] : null);
    var nights = nightsBetween(t.dateIn, t.dateOut);
    var dateLine = (t.dateIn && t.dateOut)
      ? fmtDate(new Date(t.dateIn+"T00:00:00"))+" → "+fmtDate(new Date(t.dateOut+"T00:00:00"))+" · "+nights+" night"+(nights===1?"":"s")
      : "";

    var bw = "";
    if (t.booked){
      // booked reservation → check-in countdown (no booking-window math)
      if (!past && t.dateIn){
        var days = Math.ceil((new Date(t.dateIn+"T00:00:00") - new Date(new Date().toDateString()))/86400000);
        var label = days>0 ? (days+" day"+(days===1?"":"s")+" until check-in") : (days===0 ? "Check in today" : "");
        if (label) bw = '<div style="margin-top:10px"><span style="font-size:12px;font-weight:700;color:'+C.green+';background:rgba(47,107,70,.12);padding:4px 10px;border-radius:999px">'+label+'</span></div>';
      }
    } else if (p){
      // existing planning trip → booking-window pill (unchanged)
      var bi = past ? null : bookingInfo(p, t.dateIn);
      if (bi){
        if (bi.openIn>0){
          bw = '<div style="margin-top:10px;display:flex;align-items:center;gap:10px;flex-wrap:wrap">'+
            '<span style="font-size:12px;font-weight:700;color:'+C.ember+';background:rgba(207,90,38,.10);padding:4px 10px;border-radius:999px">Books in '+bi.openIn+' day'+(bi.openIn===1?"":"s")+' · '+fmtDate(bi.openDate)+'</span>'+

      : "";

  function saveBooking(){
    var f = state.bookingForm;
    var editing = state.editingTripId != null;
    if (!editing && !isPro() && state.trips.length >= 2){ openUpgrade("trips"); return; }   // Pro: unlimited trips; Free cap = 2 (editing an existing trip is always allowed)
    var hasPark = f.custom ? (!!f.parkName.trim() && !!f.network) : (f.parkId!=null);
    if (!hasPark){ f.error = f.custom ? "Enter a park name and pick a network." : "Search and pick a park, or use “Not in the list?”"; render(); return; }
    if (!f.dateIn || !f.dateOut){ f.error = "Pick your arrival and departure dates."; render(); return; }
    if (nightsBetween(f.dateIn, f.dateOut) < 1){ f.error = "Departure must be after arrival."; render(); return; }
    var network = f.custom ? f.network : (parkById(f.parkId)||{}).network;
    var os = overStayInfo(network, f.dateIn, f.dateOut);
    var orig = editing ? tripById(state.editingTripId) : null;
    var rec = {
      id: editing ? state.editingTripId : Date.now(),
      parkId: f.custom ? null : f.parkId,
      parkName: f.custom ? f.parkName.trim() : undefined,
      dateIn: f.dateIn, dateOut: f.dateOut,
      network: network,
      confirmation: f.confirmation.trim(),
      note: f.note.trim(),
      booked: editing ? !!(f.markBooked || (orig && orig.booked)) : true,
      overStay: os || false
    };
    if (editing){ state.trips = state.trips.map(function(t){ return String(t.id)===String(state.editingTripId) ? rec : t; }); state.editingTripId = null; }
    else { state.trips.push(rec); }
    persist();
    refreshPushReminders();
    state.addBooking=false; state.bookingForm=freshBookingForm();
    state.tab="trips"; render();
  }

  var VAPID_PUBLIC = "BFQJwjf-s67QP4QhudRAqxoSz9x4MFN4ALXQcJnZk-eX-y8_UMlPJ7m6SGg5TXsmx2oyzeVIMhk_MM1KHMIoLo8";

  function urlB64ToUint8Array(b64){
    var pad = "=".repeat((4 - b64.length % 4) % 4);
    var base = (b64 + pad).replace(/-/g,"+").replace(/_/g,"/");
    var raw = atob(base), out = new Uint8Array(raw.length);
    for (var i=0;i<raw.length;i++) out[i] = raw.charCodeAt(i);
    return out;
  }
  function computeReminders(){
    var out = [];
    (state.trips||[]).forEach(function(t){
      if (t.booked) return;                         // booked = already reserved
      var p = t.parkId ? parkById(t.parkId) : null;
      if (!p || !t.dateIn) return;
      var bi = bookingInfo(p, t.dateIn);
      if (bi && bi.openDate && bi.openIn>0){
        function z(n){ return (n<10?"0":"")+n; }
        var d = bi.openDate;
        out.push({ trip_id:String(t.id), park_name:p.name, fire_on:d.getFullYear()+"-"+z(d.getMonth()+1)+"-"+z(d.getDate()) });
      }
    });
    return out;
  }
  function syncPush(subJson){

      body: JSON.stringify({ subscription: subJson, reminders: computeReminders() }) }).catch(function(){});

  function initAuth(){

    sb.auth.getSession().then(function(r){ state.account.session = (r && r.data) ? r.data.session : null; state.authChecked = true; refreshSubscription(); subscribeRealtime(); maybeClaimInvite(); render(); }).catch(function(){ state.authChecked = true; render(); });
    sb.auth.onAuthStateChange(function(_e, session){ state.account.session = session || null; state.authChecked = true; state.isPaid = false; state.account.subStatus = null; if (session){ refreshSubscription(); subscribeRealtime(); maybeClaimInvite(); } else { state.upsell=null; unsubscribeRealtime(); } render(); });   // reset isPaid before re-deriving so one account's Pro can't carry into another session
    // Returning from Stripe Checkout: the webhook writes the row a few seconds AFTER redirect, so show a
    // "Confirming…" screen and poll until the row lands — instead of dropping the user back on the plan page
    // (which reads like the payment failed even though it succeeded).
    if (typeof location !== "undefined" && /[?&]checkout=success/.test(location.search || "")){
      startCheckoutConfirm();

    if (typeof location !== "undefined" && /[?&]tip=thanks/.test(location.search || "")){
      state.tipToast = true; tipBooted = true; markTipShown();
      try { history.replaceState({}, "", location.pathname); } catch(e){}

  }
  /* Reads the user's subscription row (RLS = own row only) and derives isPro. Drives the badge AND the gates. */
  function refreshSubscription(){
    if (!sb){ state.isPaid = false; state.account.subStatus = null; return Promise.resolve(); }
    // Read entitlement with an EXPLICITLY-authenticated PostgREST request. supabase-js intermittently
    // fails to attach the user JWT to from() queries on the checkout-return load (the session is restored
    // but the rest client stays anon), so RLS returns []. Pulling the token from getSession() and sending
    // it ourselves (apikey + Bearer) guarantees the authed read — entitlement still derives ONLY from the row.
    return sb.auth.getSession().then(function(r){
      var session = (r && r.data && r.data.session) || state.account.session;
      var tok = session && session.access_token;
      var uid = session && session.user && session.user.id;
      if (session) state.account.session = session;
      if (!tok || !uid){ state.isPaid = false; state.account.subStatus = null; return; }
      // Read ONLY status. This project's PostgREST returns [] unpredictably for other select shapes
      // (verified via headless repro: select=* and select=status,current_period_end each returned [] in
      // different schema-cache states, silently keeping isPaid false and stranding checkout on "confirming").
      // select=status returned the row in EVERY test. Status already reflects Stripe cancellation (the
      // webhook sets canceled/past_due when a period lapses), so gating on status is correct and robust.
      // cache:"no-store" forces every read to hit the network rather than replay a stale empty result.
      return fetch(SUPABASE_URL + "/rest/v1/subscriptions?select=status&user_id=eq." + uid, {
        cache: "no-store",
        headers: { apikey: SUPABASE_ANON_KEY, Authorization: "Bearer " + tok }
      }).then(function(resp){ return resp.ok ? resp.json() : []; }).then(function(rows){
        var row = rows && rows[0];
        if (row) {
          // A row present is authoritative: active/trialing -> Pro, anything else (canceled/past_due) -> Free.
          state.isPaid = (row.status === "active" || row.status === "trialing");
          state.account.subStatus = row.status;
        } else if (!state.isPaid) {
          // No row AND not already Pro -> Free. Do NOT clobber a just-confirmed Pro on an empty read:
          // PostgREST has a brief read-after-write lag that returns [] right after the row is written,
          // and an in-flight focus/boot read could otherwise undo the confirm-checkout flip. Cancellation
          // is a row with status=canceled (handled above), never an empty result, so this stays correct.
          state.account.subStatus = null;
        }
        if (state.isPaid) state.upsell = null;   // going Pro dismisses any open upgrade prompt
        maybeShowTip();                          // Tip jar: raise the 14-day prompt once entitlement is known
        render();
      });
    }).catch(function(){});
  }
  /* Realtime: flip the UI the instant the webhook writes the row — no reload, ahead of the poll (spec Fix 3). */
  function subscribeRealtime(){
    if (!sb || subChannel) return;
    var sess = state.account.session;
    var u = sess && sess.user;
    if (!u) return;
    try {
      // Authenticate the realtime socket so RLS authorizes postgres_changes on the user's own row.
      if (sess.access_token) { try { sb.realtime.setAuth(sess.access_token); } catch(e){} }
      subChannel = sb.channel("sub-"+u.id)
        .on("postgres_changes", { event:"*", schema:"public", table:"subscriptions", filter:"user_id=eq."+u.id }, function(){ refreshSubscription(); })
        .subscribe();
    } catch(e){ subChannel = null; }
  }
  function unsubscribeRealtime(){ if (sb && subChannel){ try { sb.removeChannel(subChannel); } catch(e){} subChannel = null; } }
  /* After returning from Stripe Checkout, the webhook writes the subscription row a few seconds later.
     Poll for it and keep a "Confirming…" screen up until isPaid flips true or the window elapses, so a
     paying user never lands back on the plan page thinking it failed. */
  function startCheckoutConfirm(){
    if (!sb) return;
    state.confirmCheckout = true; state.confirmTimedOut = false;
    var attempts = 0, MAX = 8;   // ~8 × 3s ≈ 24s — fallback if the synchronous reconcile below fails
    render();
    function stripParam(){ try { history.replaceState({}, "", location.pathname); } catch(e){} }
    function succeed(){ if (!state._boughtTracked){ state._boughtTracked = true; track("purchase", { currency: "USD" }); } state.confirmCheckout = false; stripParam(); render(); }   // conversion: Pro purchase confirmed
    function tick(){
      attempts++;
      // Chain on the CONFIRMED result — refreshSubscription is the only thing that can set isPaid true.
      refreshSubscription().then(function(){
        if (state.isPaid){ succeed(); }                          // confirmed active/trialing row → Pro/success
        else if (attempts >= MAX){                               // window elapsed, still no active row → pending
          state.confirmCheckout = false; state.confirmTimedOut = true; stripParam(); render();
        } else { setTimeout(tick, 3000); }
      });
    }
    var pollStarted = false;
    function beginPoll(){ if (!pollStarted){ pollStarted = true; tick(); } }
    // Reconcile Stripe -> Supabase synchronously first so we don't race the async webhook. The endpoint
    // writes the row before responding; we then read it (entitlement still comes ONLY from the row).
    // IMPORTANT: resolve the session HERE via getSession(). This runs at page-load, BEFORE initAuth's
    // getSession() has populated state.account.session — so reading the token off state would be empty and
    // we'd silently skip the reconcile and just poll (the bug that caused the post-checkout pending screen).
    sb.auth.getSession().then(function(r){
      var session = r && r.data && r.data.session;
      if (session) state.account.session = session;   // ensure refreshSubscription can read the row
      var tok = session && session.access_token;
      if (tok){
        fetch("/api/confirm-checkout", { method:"POST", headers:{ "Authorization":"Bearer "+tok } })
          .then(function(resp){ return resp.json(); })
          .then(function(d){
            // confirm-checkout is server-side truth: it reads the Stripe subscription AND writes the row.
            // Trust its active flag for the immediate flip — this avoids the read-after-write lag where the
            // client's RLS read returns [] for several seconds right after the row is written.
            if (d && d.active){ state.isPaid = true; state.upsell = null; succeed(); }
            else { return refreshSubscription().then(function(){ if (state.isPaid) succeed(); else beginPoll(); }); }
          })
          .catch(function(){ beginPoll(); });
        setTimeout(beginPoll, 8000);   // safety net if reconcile never resolves
      } else {
        beginPoll();   // no session token yet — poll the row; initAuth restores the session shortly
      }
    }).catch(function(){ beginPoll(); });
  }
  function authSubscribe(plan){

  /* numeric rank only for genuine counts ("2","6") and day-windows ("60 Days") —
     deliberately returns null for term strings like "2 or 4 years". */
  function perksNum(v){
    v = String(v).trim();
    if (/^\d+$/.test(v)) return parseInt(v,10);
    var m = v.match(/^(\d+)\s*Days?\b/i); return m ? parseInt(m[1],10) : null;
  }
  function perksImproves(cur, next){
    if (next==="No") return false;
    if (cur==="No") return true;                                   // newly included
    if (cur==="Option to Join" && next==="Yes") return true;       // now bundled in
    var cn=perksNum(cur), nn=perksNum(next);
    if (cn!=null && nn!=null && nn>cn) return true;                // bigger count / wider window
    if (cur==="Choose Region(s)" && /^All/.test(next)) return true; // regional → national
    return false;
  }

  function buildReferralSMS(){
    var prof = state.profile, r = state.refer;
    var sales = prof.salesPhone ? String(prof.salesPhone).replace(/[^\d+]/g,"") : "";
    var friendName = (r.friendName||"").trim();
    var friendPhone = (r.friendPhone||"").trim();
    if (!sales || !friendName || !friendPhone) return null;
    var salesName = (prof.salesName||"there").trim();
    var yourName = (prof.fullName||"").trim();
    var friendEmail = (r.friendEmail||"").trim();
    var intro = yourName ? ("Hey "+salesName+", it's "+yourName+".") : ("Hey "+salesName+".");
    var body = intro+" I'm referring a friend — "+friendName+". Their number is "+friendPhone+
      (friendEmail ? " and email is "+friendEmail : "")+
      ". They're expecting you to reach out. Thanks!";
    return "sms:"+sales+"?&body="+encodeURIComponent(body);
  }

  /* ---- Tip jar (one-time donations) ----
     A friendly "support this project" prompt shown at most once every 14 days to BOTH Free and Pro.
     The cadence lives in its own localStorage key. The tip is mode:payment in /api/tip — it never
     creates a subscriptions row, so a tip can't be confused for a Pro grant. */
  var TIP_KEY = "hitchpass.tipLastShown";
  var TIP_INTERVAL_MS = 14 * 24 * 60 * 60 * 1000;
  function tipDue(){
    try { var last = parseInt(localStorage.getItem(TIP_KEY) || "0", 10);
      return !(last > 0) || (Date.now() - last) >= TIP_INTERVAL_MS; } catch(e){ return true; }
  }
  function markTipShown(){ try { localStorage.setItem(TIP_KEY, String(Date.now())); } catch(e){} }
  var tipBooted = false;   // once per page load
  /* Raise the prompt once entitlement is known and the main app is visible — never over the front
     door, the onboarding plan choice, the post-checkout confirm screen, or a thank-you toast. */
  function maybeShowTip(){
    if (tipBooted) return;
    if (!signedIn() || !hasChosenPlan() || state.confirmCheckout || state.tipToast) return;
    if (!tipDue()){ tipBooted = true; return; }
    tipBooted = true; state.tipPrompt = true; render();
  }
  /* POST the chosen amount (cents) to /api/tip and redirect to Stripe Checkout. Sends the auth token
     when signed in (cleaner receipt); the server validates and bounds the amount regardless. */
  function sendTip(cents){
    if (state.tipBusy) return;
    state.tipBusy = true; state.tipError = ""; render();
    var a = state.account;
    var headers = { "Content-Type": "application/json" };
    if (a && a.session && a.session.access_token) headers.Authorization = "Bearer " + a.session.access_token;
    fetch("/api/tip", { method: "POST", headers: headers, body: JSON.stringify({ amount: cents }) })
      .then(function(r){ return r.json(); }).then(function(d){
        if (d && d.url){ markTipShown(); window.location.href = d.url; }
        else { state.tipBusy = false; state.tipError = (d && d.error) || "Couldn’t start the tip. Please try again."; render(); }
      }).catch(function(){ state.tipBusy = false; state.tipError = "Couldn’t start the tip. Please try again."; render(); });
  }
  function dismissTip(){ state.tipPrompt = false; state.tipCustomOpen = false; markTipShown(); render(); }

  /* ---- Add a trip to Google / Outlook / Apple calendars (all-day, spanning the stay) ---- */
  function tripCalData(t){
    var p = t.parkId ? parkById(t.parkId) : null;
    var name = p ? p.name : (t.parkName || "Saved trip");
    var net = NETWORKS[t.network] || (p ? NETWORKS[p.network] : null);
    var title = "Hitch Pass · " + name + (net ? " ("+net.short+")" : "");
    var nights = nightsBetween(t.dateIn, t.dateOut);
    function compact(iso){ return iso ? iso.replace(/-/g,"") : ""; }
    function plusDays(iso, n){ var d=new Date(iso+"T00:00:00"); d.setDate(d.getDate()+n); function z(x){return (x<10?"0":"")+x;} return d.getFullYear()+"-"+z(d.getMonth()+1)+"-"+z(d.getDate()); }
    var endExclIso = plusDays(t.dateOut, 1);   // all-day end is exclusive; +1 covers the checkout day
    var details = nights+" night"+(nights===1?"":"s")+" stay"+(t.confirmation?" · Confirmation "+t.confirmation:"")+(t.note?" · "+t.note:"")+" · via Hitch Pass";
    return { name:name, title:title, loc:name, startIso:t.dateIn, endExclIso:endExclIso, startYMD:compact(t.dateIn), endYMD:compact(endExclIso), details:details };
  }
  function downloadTripIcs(t){

    var a=document.createElement("a"); a.href=ics; a.download="hitchpass-trip.ics"; document.body.appendChild(a); a.click(); a.remove();
    state.calTripId=null; render();
  }

  function render(){
    var app = document.getElementById("app");
    teardownMap();   // discard any live map before the DOM is replaced (prevents stacking)
    // FRONT DOOR: when Supabase is available, gate entry on the (locally-cached, offline-safe) session.
    // - still checking the cached session -> brief branded loading (no flash of the login)
    // - checked + no session -> the email front-door login (occupies the old passcode-gate slot)
    // - signed in -> the app.  sb===null (Supabase unreachable) -> never lock out: fall through to the app.
    if (sb && !state.authChecked){ app.innerHTML = authLoadingView(); return; }
    if (sb && state.authChecked && !signedIn()){ app.innerHTML = frontDoorView(); var fde=document.getElementById("fde"); if(fde) fde.focus(); return; }
    if (sb && state.authChecked && signedIn() && state.confirmCheckout && !state.isPaid){ app.innerHTML = confirmingView(); return; }   // post-checkout: confirming Pro before falling back to plan page
    if (sb && state.authChecked && signedIn() && !hasChosenPlan()){ app.innerHTML = planChoiceView(); return; }   // one-time onboarding choice
    var body;
    if (state.tab==="explore"){ body = state.selected ? detailView() : exploreView(); }
    else if (state.tab==="home"){ body = homeView(); }
    else if (state.tab==="tools"){ body = toolsView(); }
    else if (state.tab==="trips"){ body = tripsView(); }
    else if (state.tab==="refer"){ body = referView(); }
    else if (state.tab==="profile"){ body = profileView(); }
    else if (state.tab==="perks"){ body = perksView(); }
    else { body = homeView(); }
    app.innerHTML = '<div class="wrap">'+
      '<div class="ribbon">'+ic("alert",14,"#e0875a")+'<span>Unofficial · made by a customer, not by Thousand Trails / Encore / ELS · all names are trademarks of their owners</span></div>'+
      '<div class="content">'+(state.inviteMsg?inviteBanner():"")+body+'</div>'+
      '<div class="footer">Unofficial · made by a customer, not the company</div>'+
      navView()+
    '</div>' + upgradeOverlayHTML() + calOverlayHTML() + dirOverlayHTML() + bookReturnHTML() + tipPromptHTML() + tipToastHTML();
    if (state.tab==="explore" && !state.selected && state.exploreMode==="map"){ initExploreMap(); }
  }

  /* ---- events ---- */
  document.addEventListener("click", function(e){
    var el = e.target.closest ? e.target.closest("[data-act]") : null;
    if (!el) return;
    var act = el.getAttribute("data-act");
    var arg = el.getAttribute("data-arg");
    if (act==="nav"){
      state.addBooking=false;
      if (arg==="explorefree"){ state.tab="explore"; state.selected=null; state.freeOnly=true; }
      else if (arg==="explore"){ state.tab="explore"; state.selected=null; }
      else { state.tab=arg; state.selected=null; }
      render();
    }
    else if (act==="share"){ shareApp(); }
    else if (act==="park"){ state.selected=parseInt(arg,10); state.dates={in:"",out:""}; render(); }
    else if (act==="back"){ state.selected=null; render(); }
    else if (act==="netfilter"){ state.netFilter=arg; state.explorePage=1; render(); }
    else if (act==="freeonly"){ state.freeOnly=!state.freeOnly; state.explorePage=1; render(); }
    else if (act==="favonly"){ state.favOnly=!state.favOnly; state.explorePage=1; render(); }
    else if (act==="fav-toggle"){ var fid=parseInt(arg,10); var fi=state.favorites.indexOf(fid); if(fi<0) state.favorites.push(fid); else state.favorites.splice(fi,1); persist(); render(); }
    else if (act==="regionfilter"){ if (state.regionFilter.has(arg)) state.regionFilter.delete(arg); else state.regionFilter.add(arg); state.explorePage=1; render(); }
    else if (act==="regionall"){ state.regionFilter.clear(); state.explorePage=1; render(); }
    else if (act==="explore-mode"){ if (state.exploreMode!==arg){ state.exploreMode=arg; render(); } }
    else if (act==="explore-page"){
      state.explorePage += (arg==="next"?1:-1);
      if (state.explorePage<1) state.explorePage=1;
      var pl=document.getElementById("plist"); if(pl){ pl.innerHTML=listHTML(); pl.scrollIntoView({block:"start"}); } else render();
    }
    else if (act==="remind"){ downloadReminder(parkById(state.selected), state.dates.in); }
    else if (act==="reserve"){ var pp=parkById(state.selected); if(pp){ state.pendingBook={ fromTripId:null, parkId:pp.id, parkName:null, network:pp.network, dateIn:(state.dates&&state.dates.in)||"", dateOut:(state.dates&&state.dates.out)||"", ts:Date.now() }; window.open(NETWORKS[pp.network].url,"_blank"); } }
    else if (act==="book-now-trip"){ var bt=tripById(arg); if(bt){ var bnet=NETWORKS[bt.network]; state.pendingBook={ fromTripId:bt.id, parkId:bt.parkId||null, parkName:bt.parkName||null, network:bt.network, dateIn:bt.dateIn||"", dateOut:bt.dateOut||"", ts:Date.now() }; if(bnet&&bnet.url) window.open(bnet.url,"_blank"); } }
    else if (act==="book-return-dismiss"){ state.bookReturnShow=false; state.pendingBook=null; render(); }
    else if (act==="book-save-trip"){
      var pb=state.pendingBook;
      if (pb){
        var bp = pb.parkId ? parkById(pb.parkId) : null;
        state.bookingForm = { parkQuery: bp?bp.name:(pb.parkName||""), parkId: pb.parkId||null, parkName: pb.parkName||"", network: pb.network||"", custom: !pb.parkId, dateIn: pb.dateIn||"", dateOut: pb.dateOut||"", confirmation:"", note:"", error:"", markBooked:true };
        state.editingTripId = pb.fromTripId || null;
        if (pb.fromTripId){ var ex=tripById(pb.fromTripId); if(ex){ state.bookingForm.confirmation=ex.confirmation||""; state.bookingForm.note=ex.note||""; } }
        state.addBooking=true; state.tab="trips"; state.bookReturnShow=false; state.pendingBook=null; render();
      }
    }
    else if (act==="copynum"){ if(!isPro()){ openUpgrade("copy"); return; } var pp2=parkById(state.selected); var nm=pp2 && state.profile.members[pp2.network]; if(nm && navigator.clipboard){ navigator.clipboard.writeText(nm); alert("Copied: "+nm); } }
    else if (act==="go-pro"){ openUpgrade(arg||true); }
    else if (act==="upsell-close"){ state.upsell=null; render(); }
    else if (act==="tip-amount"){ var tc=parseInt(arg,10); if (tc>0) sendTip(tc); }
    else if (act==="tip-custom"){ state.tipCustomOpen=true; state.tipError=""; render(); }
    else if (act==="tip-custom-submit"){
      var inp=document.getElementById("tipcustom");
      var dollars=inp?Number(inp.value):NaN;
      if (!isFinite(dollars) || dollars<1 || dollars>500){ state.tipError="Enter an amount between $1 and $500."; render(); return; }
      sendTip(Math.round(dollars*100));
    }
    else if (act==="tip-dismiss" || act==="tip-bg"){ dismissTip(); }
    else if (act==="tip-toast-close"){ state.tipToast=false; render(); }
    else if (act==="addtrip"){
      var pk=parkById(state.selected);
      if (!pk) return;
      if (!isPro() && state.trips.length >= 2){ openUpgrade("trips"); return; }   // Pro: unlimited trips; Free cap = 2
      if (!state.dates.in || !state.dates.out){ alert("Pick your arrival and departure dates first."); return; }
      if (nightsBetween(state.dates.in, state.dates.out) < 1){ render(); return; }   // dep<=arr → blocked; inline error shows
      var os = overStayInfo(pk.network, state.dates.in, state.dates.out);
      state.trips.push({ id:Date.now(), parkId:pk.id, dateIn:state.dates.in, dateOut:state.dates.out, network:pk.network, overStay: os || false });
      persist();
      state.tab="trips"; state.selected=null; render();
    }
    else if (act==="auth-submit"){ authPassword(); }
    else if (act==="auth-toggle-mode"){ authToggleMode(); }
    else if (act==="auth-subscribe"){ authSubscribe(arg); }
    else if (act==="invite-dismiss"){ state.inviteMsg = null; render(); }
    else if (act==="manage-sub"){ openBillingPortal(); }
    else if (act==="plan-free"){ choosePlanFree(); }
    else if (act==="auth-signout"){ authSignOut(); }
    else if (act==="wallet-toggle"){
      var wi=state.wallet.indexOf(arg);
      if (wi>-1) state.wallet.splice(wi,1); else state.wallet.push(arg);
      persist(); render();
    }
    else if (act==="set-tier"){ if (perksTierDef(arg)){ state.tier=arg; persist(); render(); } }
    else if (act==="perks-toggle"){ state.perksExpanded[arg]=!state.perksExpanded[arg]; render(); }
    else if (act==="perks-compare"){ state.perksCompare=!state.perksCompare; render(); }
    else if (act==="tools-radius"){ state.tools.radius=parseInt(arg,10); render(); }
    else if (act==="send-referral"){ var su=buildReferralSMS(); if(su){ window.location.href=su; } }
    else if (act==="add-booking"){ state.bookingForm=freshBookingForm(); state.addBooking=true; state.editingTripId=null; render(); }
    else if (act==="booking-custom"){ state.bookingForm.custom=true; state.bookingForm.parkId=null; state.bookingForm.error=""; render(); }
    else if (act==="booking-search"){ state.bookingForm.custom=false; state.bookingForm.error=""; render(); }
    else if (act==="booking-pick"){ var bp=parkById(parseInt(arg,10)); if(bp){ var bf=state.bookingForm; bf.parkId=bp.id; bf.network=bp.network; bf.parkQuery=bp.name; bf.error=""; } render(); }
    else if (act==="booking-cancel"){ state.addBooking=false; state.bookingForm=freshBookingForm(); state.editingTripId=null; render(); }
    else if (act==="booking-save"){ saveBooking(); }
    else if (act==="trip-view"){ var tv=tripById(arg); if(tv){ state.tab="explore"; state.selected=tv.parkId; state.dates={in:tv.dateIn||"",out:tv.dateOut||""}; render(); } }
    else if (act==="trip-edit"){
      var teTrip=tripById(arg);
      if (teTrip){
        var tePk = teTrip.parkId ? parkById(teTrip.parkId) : null;
        state.bookingForm = { parkQuery: tePk ? tePk.name : (teTrip.parkName||""), parkId: teTrip.parkId||null, parkName: teTrip.parkName||"", network: teTrip.network||"", custom: !teTrip.parkId, dateIn: teTrip.dateIn||"", dateOut: teTrip.dateOut||"", confirmation: teTrip.confirmation||"", note: teTrip.note||"", error:"" };
        state.editingTripId = teTrip.id; state.addBooking = true; state.tab="trips"; render();
      }
    }
    else if (act==="trip-remind"){ var tr=tripById(arg); if(tr){ downloadReminder(parkById(tr.parkId), tr.dateIn); } }
    else if (act==="trip-cal"){ state.calTripId=arg; render(); }
    else if (act==="trip-ics"){ var tci=tripById(arg); if(tci) downloadTripIcs(tci); }
    else if (act==="cal-close"){ state.calTripId=null; render(); }
    else if (act==="trip-dir"){ state.dirTripId=arg; render(); }
    else if (act==="dir-close"){ state.dirTripId=null; render(); }
    else if (act==="enable-push"){ enablePush(); }
    else if (act==="trip-remove"){
      var trm=tripById(arg);
      var pnm = (trm && parkById(trm.parkId)) ? parkById(trm.parkId).name : "this trip";
      if (trm && confirm("Remove "+pnm+" from your trips?")){ state.trips=state.trips.filter(function(x){ return String(x.id)!==String(arg); }); persist(); refreshPushReminders(); render(); }
    }
  });
  document.addEventListener("input", function(e){
    var t = e.target; if (!t || !t.getAttribute) return;
    if (t.id==="q"){
      state.q=t.value; state.explorePage=1;
      if (state.exploreMode==="map"){
        updateMapNote();
        clearTimeout(mapSearchTimer);
        mapSearchTimer=setTimeout(function(){ if(state.tab==="explore" && state.exploreMode==="map" && document.getElementById("mapHost")) initExploreMap(); }, 400);
      } else {
        var l=document.getElementById("plist"); if(l) l.innerHTML=listHTML();
      }
      return;
    }
    var rk = t.getAttribute("data-refer");
    if (rk){ state.refer[rk]=t.value; updateReferBtn(); return; }
    var pk = t.getAttribute("data-profile");
    if (pk){ state.profile[pk]=t.value; persist(); return; }
    var mk = t.getAttribute("data-member");
    if (mk){ if(!state.profile.members) state.profile.members={}; state.profile.members[mk]=t.value; persist(); return; }
    var ak = t.getAttribute("data-auth");
    if (ak){ state.account[ak]=t.value; if(state.account.error) state.account.error=""; return; }   // transient; Supabase owns the session
    var tk = t.getAttribute("data-tools");
    if (tk){ state.tools[tk]=t.value; if(tk!=="city") updateSavings(); return; }
    if (t.id==="bookingPark"){ state.bookingForm.parkQuery=t.value; state.bookingForm.parkId=null; updateBookingResults(); return; }
    var bk = t.getAttribute("data-booking");
    if (bk){ state.bookingForm[bk]=t.value; return; }
  });
  document.addEventListener("change", function(e){
    var t = e.target; if (!t || !t.getAttribute) return;
    var d = t.getAttribute("data-date");
    if (d){ state.dates[d]=t.value; render(); return; }
    var bd = t.getAttribute("data-bdate");
    if (bd){ state.bookingForm[bd==="in"?"dateIn":"dateOut"]=t.value; render(); return; }   // re-render for live over-limit warning
    var bk = t.getAttribute("data-booking");
    if (bk){ state.bookingForm[bk]=t.value; return; }
  });

  /* Re-check entitlement whenever the tab regains focus/visibility. Re-reads in BOTH directions:
     upgrades when activation lands (3-DS / slow webhook) AND downgrades when a subscription was
     canceled in another tab (Stripe portal/dashboard). Safe to run while Pro because refreshSubscription
     never clobbers Pro on an empty read — only a real row with a non-active status downgrades. */
  function recheckIfBackground(){ if (sb && state.account.session) refreshSubscription(); }
  document.addEventListener("visibilitychange", function(){ if (!document.hidden) recheckIfBackground(); });
  window.addEventListener("focus", recheckIfBackground);
  window.addEventListener("pageshow", recheckIfBackground);

  render();
  try { var _inv = new URLSearchParams(location.search || "").get("invite"); if (_inv) localStorage.setItem("hp_invite", _inv.toLowerCase().trim()); } catch(e){}   // capture ?invite=CODE for the launch promo
  // When you return from the external Book-now site, offer to save the trip (park + dates pre-filled).
  document.addEventListener("visibilitychange", function(){
    if (document.visibilityState !== "visible") return;
    var pb = state.pendingBook;
    if (!pb || state.bookReturnShow || (Date.now()-(pb.ts||0) <= 3000)) return;
    var ex = pb.fromTripId ? tripById(pb.fromTripId) : null;
    if (ex){
      // Booked an existing trip → jump straight to its Edit form so you can add the confirmation #.
      var p = ex.parkId ? parkById(ex.parkId) : null;
      state.bookingForm = { parkQuery: p?p.name:(ex.parkName||""), parkId: ex.parkId||null, parkName: ex.parkName||"", network: ex.network||"", custom: !ex.parkId, dateIn: ex.dateIn||"", dateOut: ex.dateOut||"", confirmation: ex.confirmation||"", note: ex.note||"", error:"", markBooked:true };
      state.editingTripId = ex.id; state.addBooking = true; state.tab = "trips"; state.pendingBook = null;
      render();
    } else {
      // Booked from a park (no trip yet) → offer to create one.
      state.bookReturnShow = true; render();
    }
  });
  initAuth();   // restore any persisted Supabase session + reflect signed-in state (no-op if sb is null)
  var sp = document.getElementById("splash");
  if (sp){ sp.style.opacity="0"; setTimeout(function(){ if(sp.parentNode) sp.parentNode.removeChild(sp); }, 480); }
})();
</script>
<script>
  /* Register the service worker for offline use — no-ops where unsupported. */
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", function(){
      navigator.serviceWorker.register("sw.js").catch(function(){});
    });
  }
</script>
