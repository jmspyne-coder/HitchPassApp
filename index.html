  function prodURL(){
    var h = location.hostname;
    var bad = !h || h==="localhost" || h.indexOf(".local")>-1 || h.indexOf("claude")>-1 ||
              h.indexOf("anthropic")>-1 || h.indexOf("sandbox")>-1 || h.indexOf("usercontent")>-1 ||
              /^\d+\.\d+\.\d+\.\d+$/.test(h);
    return bad ? "https://hitchpass.com" : location.origin + location.pathname;
  }
  function shareApp(){
    var url = prodURL();
    if (navigator.share){ navigator.share({ title:"Hitch Pass", text:"My RV membership wallet", url:url }).catch(function(){}); }
    else if (navigator.clipboard){ navigator.clipboard.writeText(url); alert("Link copied: "+url); }
    else { alert(url); }
  }

  /* ---- engine ---- */
  function cost(p){
    var n = NETWORKS[p.network];
    if (state.wallet.indexOf(p.network)===-1) return { tier:"locked", price:"Add this card", label:TIER.locked.label };
    if (p.priceOverride) return p.priceOverride;
    return { tier:n.tier, price:n.price, label:TIER[n.tier].label };
  }
  function pill(info){
    var s = TIER[info.tier];
    var lk = info.tier==="locked" ? ic("lock",11,s.fg) : "";
    return '<span style="background:'+s.bg+';color:'+s.fg+';font-weight:700;font-size:11.5px;padding:3px 9px;border-radius:999px;display:inline-flex;align-items:center;gap:5px">'+lk+info.label+' · '+esc(info.price)+'</span>';
  }
  function parkById(id){ for (var i=0;i<PARKS.length;i++){ if (PARKS[i].id===id) return PARKS[i]; } return null; }
  function fmtDate(d){ return d.toLocaleDateString(undefined,{ weekday:"short", month:"short", day:"numeric" }); }
  function nightsBetween(a,b){ if(!a||!b) return 0; return Math.round((new Date(b+"T00:00:00") - new Date(a+"T00:00:00"))/86400000); }
  function todayLocalStr(){ var d=new Date(); function z(n){ return (n<10?"0":"")+n; } return d.getFullYear()+"-"+z(d.getMonth()+1)+"-"+z(d.getDate()); }
  function bookingInfo(p, dateInStr){
    var net = NETWORKS[p.network];
    if (!net || !net.window || !dateInStr) return null;
    var arrival = new Date(dateInStr+"T00:00:00");
    var openDate = new Date(arrival.getTime() - net.window*86400000);
    var openIn = Math.ceil((openDate - new Date(new Date().toDateString()))/86400000);
    return { net:net, openDate:openDate, openIn:openIn, open:openIn<=0 };
  }
  function ensureTripIds(){ var ch=false; state.trips.forEach(function(t,i){ if(!t.id){ t.id=Date.now()+i; ch=true; } }); if(ch) persist(); }
  function tripById(id){ for(var i=0;i<state.trips.length;i++){ if(String(state.trips[i].id)===String(id)) return state.trips[i]; } return null; }

  function downloadReminder(p, dateInStr){
    if (!p) return;
    var net = NETWORKS[p.network]; if (!net || !net.window || !dateInStr) return;
    var arrival = new Date(dateInStr+"T00:00:00");
    var openDate = new Date(arrival.getTime() - net.window*86400000);
    function z(n){ return (n<10?"0":"")+n; }
    var ymd = openDate.getFullYear()+z(openDate.getMonth()+1)+z(openDate.getDate());
    var ics = "data:text/calendar;charset=utf8," + encodeURIComponent(
      ["BEGIN:VCALENDAR","VERSION:2.0","BEGIN:VEVENT","DTSTART;VALUE=DATE:"+ymd,"DTEND;VALUE=DATE:"+ymd,
       "SUMMARY:Book "+p.name+" ("+net.short+")",
       "DESCRIPTION:Your "+net.window+"-day booking window opens today. Reserve early—popular sites fill fast.",
       "END:VEVENT","END:VCALENDAR"].join("\n"));
    var a = document.createElement("a"); a.href = ics; a.download = "booking-reminder.ics";
    document.body.appendChild(a); a.click(); a.remove();
  }

  function listHTML(){
    var ps = filteredParks();
    if (!ps.length) return '<div style="padding:26px;text-align:center;color:'+C.muted+';font-size:13.5px">No parks match.</div>';
    var pages = Math.max(1, Math.ceil(ps.length/EXPLORE_PER_PAGE));
    if (state.explorePage>pages) state.explorePage=pages;
    if (state.explorePage<1) state.explorePage=1;
    var start = (state.explorePage-1)*EXPLORE_PER_PAGE;
    var pageItems = ps.slice(start, start+EXPLORE_PER_PAGE);
    var cards = pageItems.map(parkCardHTML).join("");
    var pager = "";
    if (pages>1){
      var prevDis = state.explorePage<=1, nextDis = state.explorePage>=pages;
      function pBtn(dir,label,dis){
        return '<button class="tap" data-act="explore-page" data-arg="'+dir+'"'+(dis?" disabled":"")+
          ' style="padding:10px 16px;border-radius:11px;border:1px solid rgba(31,28,23,.16);background:#fff;font-weight:700;font-size:13.5px;color:'+C.pine+(dis?";opacity:.4;pointer-events:none":"")+'">'+label+'</button>';
      }
      pager = '<div style="display:flex;align-items:center;justify-content:space-between;gap:10px;padding:14px 2px 6px">'+
        pBtn("prev","‹ Prev",prevDis)+
        '<span style="font-size:12.5px;font-weight:700;color:'+C.muted+'">Page '+state.explorePage+' of '+pages+'</span>'+
        pBtn("next","Next ›",nextDis)+'</div>';
    }
    return cards + pager;
  }

  /* ---- Explore map (Leaflet, lazy-loaded from CDN, online-only) ---- */
  function ensureLeaflet(cb){
    if (typeof L!=="undefined"){ cb(); return; }
    if (!document.getElementById("leaflet-css")){
      var lk=document.createElement("link"); lk.id="leaflet-css"; lk.rel="stylesheet";
      lk.href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"; document.head.appendChild(lk);
    }
    var sc=document.getElementById("leaflet-js");
    if (!sc){
      sc=document.createElement("script"); sc.id="leaflet-js"; sc.src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js";
      sc.onload=function(){ cb(); };
      sc.onerror=function(){ var h=document.getElementById("mapHost"); if(h) h.innerHTML='<div style="padding:30px 20px;text-align:center;color:'+C.muted+';font-size:13.5px">Map needs a connection. Switch to List to browse offline.</div>'; };
      document.head.appendChild(sc);
    } else {
      var iv=setInterval(function(){ if(typeof L!=="undefined"){ clearInterval(iv); cb(); } }, 60);
    }
  }
  function teardownMap(){ if (mapInstance){ try{ mapInstance.remove(); }catch(e){} mapInstance=null; } }
  function initExploreMap(){
    ensureLeaflet(function(){
      var host=document.getElementById("mapHost"); if(!host || typeof L==="undefined") return;
      teardownMap();
      mapInstance=L.map(host,{ zoomControl:true, attributionControl:true });
      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{ maxZoom:18, attribution:"© OpenStreetMap" }).addTo(mapInstance);
      var pts=filteredParks().filter(hasCoord);
      if (pts.length){
        var bounds=[];
        pts.forEach(function(p){
          var m=L.marker([p.lat,p.lng]).addTo(mapInstance);
          m.bindPopup('<div style="min-width:150px"><div class="disp" style="font-weight:800;font-size:14px">'+esc(p.name)+'</div>'+
            '<div style="font-size:12px;color:#867d6c;margin:2px 0 8px">'+(p.city?esc(p.city)+', ':'')+esc(p.st)+' · '+esc(NETWORKS[p.network].short)+'</div>'+
            '<button type="button" data-mappark="'+p.id+'" style="background:'+C.ember+';color:#fff;border:none;border-radius:8px;padding:7px 12px;font-weight:700;font-size:12.5px;cursor:pointer">Open details ›</button></div>');
          bounds.push([p.lat,p.lng]);
        });
        mapInstance.fitBounds(bounds,{ padding:[28,28], maxZoom:9 });
      } else {
        mapInstance.setView([39.5,-98.35], 3);   // continental US, no pins in this filter
      }
      mapInstance.on("popupopen", function(e){
        var node=e.popup.getElement(); if(!node) return;
        var btn=node.querySelector("[data-mappark]"); if(!btn) return;
        btn.onclick=function(){ state.selected=parseInt(btn.getAttribute("data-mappark"),10); state.dates={in:"",out:""}; render(); };
      });
      setTimeout(function(){ if(mapInstance) mapInstance.invalidateSize(); }, 0);
    });
  }

  function detailView(){
    var p = parkById(state.selected);
    if (!p){ state.selected=null; return exploreView(); }
    var net = NETWORKS[p.network];
    var ci = cost(p);
    var locked = ci.tier==="locked";
    var head =
      '<button class="tap" data-act="back" style="display:flex;align-items:center;gap:6px;color:'+C.muted+';font-weight:600;font-size:13.5px;padding:14px 16px 4px">'+ic("back",18,C.muted)+'Back to parks</button>'+
      '<div class="det">'+
        '<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px">'+
          '<div><div class="disp" style="font-size:23px;font-weight:800;line-height:1.1">'+esc(p.name)+'</div>'+
          '<div style="font-size:13px;color:'+C.muted+';margin-top:3px">'+(p.city?esc(p.city)+', ':'')+esc(p.st)+(p.network==="tt"&&p.region?' · '+esc(p.region):'')+' · '+esc(net.name)+'</div></div>'+
        '</div>'+
        '<div style="margin-top:10px">'+pill(ci)+'</div>';

    if (locked){
      return head +
        '<div style="margin-top:14px;font-size:13.5px;color:'+C.muted+';line-height:1.5">You don’t hold <b>'+esc(net.name)+'</b> in your wallet. Add it in Profile to see your rate, booking window, and reserve here.</div>'+
        '<button class="btnG tap" data-act="nav" data-arg="profile" style="margin-top:14px">Manage my wallet</button>'+
        '</div>'+ note();
    }

    var arrival = state.dates.in ? new Date(state.dates.in+"T00:00:00") : null;
    var openDate = (arrival && net.window) ? new Date(arrival.getTime() - net.window*86400000) : null;
    var openIn = openDate ? Math.ceil((openDate - new Date(new Date().toDateString()))/86400000) : null;
    var nights = (state.dates.in && state.dates.out) ? Math.round((new Date(state.dates.out+"T00:00:00") - arrival)/86400000) : 0;
    var overStay = net.maxStay && nights>net.maxStay;

    var rules = net.window
      ? esc(net.short)+': up to '+net.maxStay+' nights · book up to '+net.window+' days out'
      : esc(net.short)+': no fixed booking window';

    var bw = "";
    if (net.window && arrival && openIn!==null){
      if (openIn>0){
        bw = '<div style="margin-top:12px;background:rgba(207,90,38,.08);border:1px solid '+C.ember+';border-radius:13px;padding:12px 14px">'+
          '<div style="display:flex;align-items:center;gap:8px"><span style="color:'+C.ember+'">'+ic("calendar",17,C.ember)+'</span>'+
          '<span style="font-size:13.5px;font-weight:700">Booking opens in '+openIn+' day'+(openIn===1?"":"s")+'</span></div>'+
          '<div style="font-size:12.5px;color:'+C.muted+';margin-top:5px;line-height:1.45">'+esc(net.short)+'’s '+net.window+'-day window for these dates opens '+fmtDate(openDate)+'. Popular parks book out the morning it opens — set a reminder.</div>'+
          '<button class="btnP tap" data-act="remind" style="margin-top:10px">'+ic("bell",15,"#fff")+'Remind me '+fmtDate(openDate)+'</button></div>';
      } else {
        bw = '<div style="margin-top:12px;background:rgba(47,107,70,.10);border:1px solid '+C.green+';border-radius:13px;padding:12px 14px">'+
          '<div style="display:flex;align-items:center;gap:8px"><span style="color:'+C.green+'">'+ic("calendar",17,C.green)+'</span>'+
          '<span style="font-size:13.5px;font-weight:700">Booking window is open now</span></div>'+
          '<div style="font-size:12.5px;color:'+C.muted+';margin-top:5px;line-height:1.45">You’re inside '+esc(net.short)+'’s '+net.window+'-day window — reserve these dates before they fill.</div></div>';
      }
    }
    var stayWarn = overStay
      ? '<div style="margin-top:10px;display:flex;align-items:center;gap:6px;color:'+C.clay+';font-size:12.5px;font-weight:600">'+ic("alert",14,C.clay)+'These dates ('+nights+' nights) exceed '+esc(net.short)+'’s '+net.maxStay+'-night max stay.</div>'
      : "";

    var num = (state.profile.members && state.profile.members[p.network]) || "";
    var memBlock = num
      ? '<div style="margin-top:14px;font-size:13px"><span style="color:'+C.muted+'">Your '+esc(net.short)+' #: </span><b>'+esc(num)+'</b> <button class="tap" data-act="copynum" style="color:'+C.green+';font-weight:700;font-size:12.5px;margin-left:6px">Copy</button></div>'
      : '<div style="margin-top:14px;font-size:12px;color:'+C.muted+'">Add your '+esc(net.short)+' number in Profile for one-tap copy at booking.</div>';

    return head +
      '<div style="margin-top:14px;font-size:12.5px;color:'+C.muted+';font-weight:600">'+rules+'</div>'+
      '<div style="display:flex;gap:10px;margin-top:12px">'+
        '<div style="flex:1"><div class="dlabel">Arrival</div><input class="dinput" type="date" data-date="in" value="'+esc(state.dates.in)+'" /></div>'+
        '<div style="flex:1"><div class="dlabel">Departure</div><input class="dinput" type="date" data-date="out" value="'+esc(state.dates.out)+'" /></div>'+
      '</div>'+
      bw + stayWarn + memBlock +
      '<button class="btnG tap" data-act="addtrip" style="margin-top:14px">'+ic("calendar",15,"#faf6ec")+'Add to my trips</button>'+
      '<button class="btnO tap" data-act="reserve" style="margin-top:10px">Reserve on '+esc(net.short)+' '+ic("ext",13,C.pine)+'</button>'+
      '</div>' + note();
  }
  function note(){
    return '<div style="font-size:11.5px;color:'+C.muted+';text-align:center;padding:0 24px 14px;line-height:1.5">Listings are for reference — always confirm availability, price, and rules on the network’s site. Hitch Pass can’t book for you.</div>';

  function stubView(name){

      '<div class="disp" style="font-size:22px;font-weight:800;color:'+C.ink+'">'+name+'</div>'+

  function tripRenders(t){ return !!(parkById(t.parkId) || t.parkName); }

  function tripCard(t, past){
    var p = parkById(t.parkId);
    if (!p && !t.parkName) return "";           // orphan with no fallback name — drop (legacy behavior)
    var name = p ? p.name : (t.parkName || "Saved trip");
    var net = NETWORKS[t.network] || (p ? NETWORKS[p.network] : null);
    var nights = nightsBetween(t.dateIn, t.dateOut);
    var dateLine = (t.dateIn && t.dateOut)
      ? fmtDate(new Date(t.dateIn+"T00:00:00"))+" → "+fmtDate(new Date(t.dateOut+"T00:00:00"))+" · "+nights+" night"+(nights===1?"":"s")
      : "";

    var bw = "";
    if (t.booked){
      // booked reservation → check-in countdown (no booking-window math)
      if (!past && t.dateIn){
        var days = Math.ceil((new Date(t.dateIn+"T00:00:00") - new Date(new Date().toDateString()))/86400000);
        var label = days>0 ? (days+" day"+(days===1?"":"s")+" until check-in") : (days===0 ? "Check in today" : "");
        if (label) bw = '<div style="margin-top:10px"><span style="font-size:12px;font-weight:700;color:'+C.green+';background:rgba(47,107,70,.12);padding:4px 10px;border-radius:999px">'+label+'</span></div>';
      }
    } else if (p){
      // existing planning trip → booking-window pill (unchanged)
      var bi = past ? null : bookingInfo(p, t.dateIn);
      if (bi){
        if (bi.openIn>0){
          bw = '<div style="margin-top:10px;display:flex;align-items:center;gap:10px;flex-wrap:wrap">'+
            '<span style="font-size:12px;font-weight:700;color:'+C.ember+';background:rgba(207,90,38,.10);padding:4px 10px;border-radius:999px">Books in '+bi.openIn+' day'+(bi.openIn===1?"":"s")+' · '+fmtDate(bi.openDate)+'</span>'+
            '<button class="tap" data-act="trip-remind" data-arg="'+t.id+'" style="font-size:12px;font-weight:700;color:'+C.green+';display:inline-flex;align-items:center;gap:4px">'+ic("bell",13,C.green)+'Remind</button></div>';
        } else {
          bw = '<div style="margin-top:10px"><span style="font-size:12px;font-weight:700;color:'+C.green+';background:rgba(47,107,70,.12);padding:4px 10px;border-radius:999px">Booking open now</span></div>';
        }
      }
    }

    var chips = "";
    if (t.confirmation) chips += '<span style="font-size:11px;font-weight:700;color:'+C.green+';background:rgba(47,107,70,.10);padding:3px 9px;border-radius:999px">Conf# '+esc(t.confirmation)+'</span>';
    var chipsRow = chips ? '<div style="margin-top:9px;display:flex;gap:6px;flex-wrap:wrap">'+chips+'</div>' : "";
    var noteRow = t.note ? '<div style="margin-top:8px;font-size:12.5px;color:'+C.muted+';line-height:1.45">'+esc(t.note)+'</div>' : "";

    var subLine = p ? (esc(p.city)+', '+esc(p.st)) : (net ? esc(net.name) : "Off-database park");
    var shortChip = net ? '<span style="font-size:10.5px;color:'+C.muted+';font-weight:700;background:#f0ebdd;padding:2px 7px;border-radius:6px">'+esc(net.short)+'</span>' : "";
    var bookedChip = t.booked ? '<span style="font-size:10.5px;color:'+C.green+';font-weight:700;background:rgba(47,107,70,.12);padding:2px 7px;border-radius:6px">Booked</span>' : "";
    var pillHTML = p ? pill(cost(p)) : "";

    var stayWarn = (net && net.maxStay && nights>net.maxStay)
      ? '<div style="margin-top:8px;display:flex;align-items:center;gap:6px;color:'+C.clay+';font-size:12px;font-weight:600">'+ic("alert",13,C.clay)+nights+' nights exceeds '+esc(net.short)+'’s '+net.maxStay+'-night max.</div>'
      : "";

    var actions = '<div style="display:flex;gap:8px;margin-top:12px">'+
      (p ? '<button class="btnO tap" data-act="trip-view" data-arg="'+t.id+'" style="flex:1">View park</button>' : '')+
      '<button class="tap" data-act="trip-remove" data-arg="'+t.id+'" style="'+(p?'padding:11px 14px':'flex:1;padding:11px;text-align:center')+';border-radius:11px;border:1px solid rgba(168,71,47,.3);color:'+C.clay+';font-weight:700;font-size:13px">Remove</button>'+
      '</div>';

    return '<div class="tcard"'+(past?' style="opacity:.6"':'')+'>'+
      '<div style="display:flex;align-items:flex-start;gap:8px">'+
        '<div style="flex:1">'+
          '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">'+
            '<span class="disp" style="font-size:17px;font-weight:800">'+esc(name)+'</span>'+
            shortChip + bookedChip +
          '</div>'+
          '<div style="font-size:12.5px;color:'+C.muted+';margin-top:2px">'+subLine+'</div>'+
        '</div>'+pillHTML+
      '</div>'+
      (dateLine? '<div style="font-size:13px;font-weight:600;margin-top:9px;display:flex;align-items:center;gap:6px">'+ic("calendar",14,C.pine)+esc(dateLine)+'</div>':'')+
      bw + chipsRow + noteRow + stayWarn + actions +
      '</div>';
  }

  function tripsView(){
    if (state.addBooking) return bookingFormView();
    ensureTripIds();
    var today = todayLocalStr();
    var trips = state.trips.slice()
      .filter(tripRenders)                       // count/show only trips that actually render
      .sort(function(a,b){ return (a.dateIn||"").localeCompare(b.dateIn||""); });
    var addBtn = '<button class="tap" data-act="add-booking" style="display:inline-flex;align-items:center;gap:5px;font-size:13px;font-weight:700;color:'+C.ember+'">'+ic("plus",16,C.ember)+'Add a booking</button>';
    var head = '<div style="padding:16px 16px 6px">'+
      '<div style="display:flex;align-items:center;justify-content:space-between;gap:10px">'+
        '<div class="disp" style="font-size:24px;font-weight:800">Trips</div>'+addBtn+
      '</div>';
    if (!trips.length){
      return head + '<div style="font-size:12.5px;color:'+C.muted+'">Your saved stays and booking windows</div></div>'+
        '<div style="padding:30px 24px;text-align:center;color:'+C.muted+'">'+ic("calendar",34,"#cdbfa6")+
        '<div style="font-size:15px;font-weight:700;color:'+C.ink+';margin-top:10px">No trips saved yet</div>'+
        '<div style="font-size:13px;margin-top:6px;line-height:1.5">Find a park in Explore to track its booking window, or log a reservation you’ve already made.</div>'+
        '<button class="btnG tap" data-act="nav" data-arg="explore" style="margin:16px auto 0;max-width:220px">Explore parks</button>'+
        '<button class="btnO tap" data-act="add-booking" style="margin:10px auto 0;max-width:220px">Add a booking</button></div>';
    }
    var upcoming = trips.filter(function(t){ return !t.dateOut || t.dateOut>=today; });
    var past = trips.filter(function(t){ return t.dateOut && t.dateOut<today; });
    var html = head + '<div style="font-size:12.5px;color:'+C.muted+';margin-bottom:6px">'+trips.length+' saved · windows &amp; check-ins tracked</div></div>'+
      '<div style="padding:6px 16px 8px">';
    html += upcoming.map(function(t){ return tripCard(t,false); }).join("");
    if (past.length){ html += '<div class="dlabel" style="margin:14px 2px 8px">Past</div>'+past.map(function(t){ return tripCard(t,true); }).join(""); }
    html += '</div>';
    return html;
  }

  function bookingResultsHTML(){
    var f = state.bookingForm;
    if (f.parkId) return "";
    var q = (f.parkQuery||"").trim().toLowerCase();
    if (!q) return "";
    var matches = PARKS.filter(function(p){ return (p.name+" "+p.city+" "+p.st).toLowerCase().indexOf(q)>-1; }).slice(0,8);
    if (!matches.length) return '<div style="font-size:12.5px;color:'+C.muted+';padding:8px 2px">No match — use “Not in the list?” below.</div>';
    return '<div style="margin-top:6px;border:1px solid rgba(31,28,23,.1);border-radius:10px;overflow:hidden">'+
      matches.map(function(p){
        return '<button class="tap" data-act="booking-pick" data-arg="'+p.id+'" style="display:block;width:100%;text-align:left;padding:9px 12px;border-bottom:1px solid rgba(31,28,23,.06);background:#fff">'+
          '<span style="font-weight:700;font-size:13.5px">'+esc(p.name)+'</span> '+
          '<span style="font-size:12px;color:'+C.muted+'">'+(p.city?esc(p.city)+', ':'')+esc(p.st)+' · '+esc(NETWORKS[p.network].short)+'</span></button>';

    state.trips.push({
      id: Date.now(),
      parkId: f.custom ? null : f.parkId,
      parkName: f.custom ? f.parkName.trim() : undefined,
      dateIn: f.dateIn, dateOut: f.dateOut,
      network: network,
      confirmation: f.confirmation.trim(),
      note: f.note.trim(),

  /* Build the SMS deep link addressed to the salesperson, prefilled in first
     person as the account holder. Returns null if required fields are missing. */
  function buildReferralSMS(){
    var prof = state.profile, r = state.refer;
    var sales = prof.salesPhone ? String(prof.salesPhone).replace(/[^\d+]/g,"") : "";
    var friendName = (r.friendName||"").trim();
    var friendPhone = (r.friendPhone||"").trim();
    if (!sales || !friendName || !friendPhone) return null;
    var salesName = (prof.salesName||"there").trim();
    var yourName = (prof.fullName||"").trim();
    var friendEmail = (r.friendEmail||"").trim();
    var intro = yourName ? ("Hey "+salesName+", it's "+yourName+".") : ("Hey "+salesName+".");
    var body = intro+" I'm referring a friend — "+friendName+". Their number is "+friendPhone+
      (friendEmail ? " and email is "+friendEmail : "")+
      ". They're expecting you to reach out. Thanks!";
    return "sms:"+sales+"?&body="+encodeURIComponent(body);
  }

  function referCanSend(){
    var r = state.refer;
    var hasSales = !!(state.profile.salesPhone && String(state.profile.salesPhone).trim());
    return hasSales && !!(r.friendName||"").trim() && !!(r.friendPhone||"").trim();
  }

  /* ---- events ---- */
  document.addEventListener("click", function(e){
    var el = e.target.closest ? e.target.closest("[data-act]") : null;
    if (!el) return;
    var act = el.getAttribute("data-act");
    var arg = el.getAttribute("data-arg");
    if (act==="nav"){
      state.addBooking=false;
      if (arg==="explorefree"){ state.tab="explore"; state.selected=null; state.freeOnly=true; }
      else if (arg==="explore"){ state.tab="explore"; state.selected=null; }
      else { state.tab=arg; state.selected=null; }
      render();
    }
    else if (act==="share"){ shareApp(); }
    else if (act==="unlock"){ tryUnlock(); }
    else if (act==="park"){ state.selected=parseInt(arg,10); state.dates={in:"",out:""}; render(); }
    else if (act==="back"){ state.selected=null; render(); }
    else if (act==="netfilter"){ state.netFilter=arg; state.explorePage=1; render(); }
    else if (act==="freeonly"){ state.freeOnly=!state.freeOnly; state.explorePage=1; render(); }
    else if (act==="explore-mode"){ if (state.exploreMode!==arg){ state.exploreMode=arg; render(); } }
    else if (act==="explore-page"){
      state.explorePage += (arg==="next"?1:-1);
      if (state.explorePage<1) state.explorePage=1;
      var pl=document.getElementById("plist"); if(pl){ pl.innerHTML=listHTML(); pl.scrollIntoView({block:"start"}); } else render();
    }
    else if (act==="remind"){ downloadReminder(parkById(state.selected), state.dates.in); }
    else if (act==="reserve"){ var pp=parkById(state.selected); if(pp){ window.open(NETWORKS[pp.network].url,"_blank"); } }
    else if (act==="copynum"){ var pp2=parkById(state.selected); var nm=pp2 && state.profile.members[pp2.network]; if(nm && navigator.clipboard){ navigator.clipboard.writeText(nm); alert("Copied: "+nm); } }
    else if (act==="addtrip"){
      var pk=parkById(state.selected);
      if (!pk) return;
      if (!state.dates.in || !state.dates.out){ alert("Pick your arrival and departure dates first."); return; }
      state.trips.push({ id:Date.now(), parkId:pk.id, dateIn:state.dates.in, dateOut:state.dates.out, network:pk.network });
      persist();
      state.tab="trips"; state.selected=null; render();
    }
    else if (act==="wallet-toggle"){
      var wi=state.wallet.indexOf(arg);
      if (wi>-1) state.wallet.splice(wi,1); else state.wallet.push(arg);
      persist(); render();
    }
    else if (act==="set-tier"){ if (TIERS[arg]){ state.tier=arg; persist(); render(); } }
    else if (act==="tools-radius"){ state.tools.radius=parseInt(arg,10); render(); }
    else if (act==="send-referral"){ var su=buildReferralSMS(); if(su){ window.location.href=su; } }
    else if (act==="add-booking"){ state.bookingForm=freshBookingForm(); state.addBooking=true; render(); }
    else if (act==="booking-custom"){ state.bookingForm.custom=true; state.bookingForm.parkId=null; state.bookingForm.error=""; render(); }
    else if (act==="booking-search"){ state.bookingForm.custom=false; state.bookingForm.error=""; render(); }
    else if (act==="booking-pick"){ var bp=parkById(parseInt(arg,10)); if(bp){ var bf=state.bookingForm; bf.parkId=bp.id; bf.network=bp.network; bf.parkQuery=bp.name; bf.error=""; } render(); }
    else if (act==="booking-cancel"){ state.addBooking=false; state.bookingForm=freshBookingForm(); render(); }
    else if (act==="booking-save"){ saveBooking(); }
    else if (act==="trip-view"){ var tv=tripById(arg); if(tv){ state.tab="explore"; state.selected=tv.parkId; state.dates={in:tv.dateIn||"",out:tv.dateOut||""}; render(); } }
    else if (act==="trip-remind"){ var tr=tripById(arg); if(tr){ downloadReminder(parkById(tr.parkId), tr.dateIn); } }
    else if (act==="trip-remove"){
      var trm=tripById(arg);
      var pnm = (trm && parkById(trm.parkId)) ? parkById(trm.parkId).name : "this trip";
      if (trm && confirm("Remove "+pnm+" from your trips?")){ state.trips=state.trips.filter(function(x){ return String(x.id)!==String(arg); }); persist(); render(); }
    }
  });
  document.addEventListener("input", function(e){
    var t = e.target; if (!t || !t.getAttribute) return;
    if (t.id==="q"){
      state.q=t.value; state.explorePage=1;
      if (state.exploreMode==="map"){
        updateMapNote();
        clearTimeout(mapSearchTimer);
        mapSearchTimer=setTimeout(function(){ if(state.tab==="explore" && state.exploreMode==="map" && document.getElementById("mapHost")) initExploreMap(); }, 400);
      } else {
        var l=document.getElementById("plist"); if(l) l.innerHTML=listHTML();
      }
      return;
    }
    var rk = t.getAttribute("data-refer");
    if (rk){ state.refer[rk]=t.value; updateReferBtn(); return; }
    var pk = t.getAttribute("data-profile");
    if (pk){ state.profile[pk]=t.value; persist(); return; }
    var mk = t.getAttribute("data-member");
    if (mk){ if(!state.profile.members) state.profile.members={}; state.profile.members[mk]=t.value; persist(); return; }
    var tk = t.getAttribute("data-tools");
    if (tk){ state.tools[tk]=t.value; if(tk!=="city") updateSavings(); return; }
    if (t.id==="bookingPark"){ state.bookingForm.parkQuery=t.value; state.bookingForm.parkId=null; updateBookingResults(); return; }
    var bk = t.getAttribute("data-booking");
    if (bk){ state.bookingForm[bk]=t.value; return; }
  });
  document.addEventListener("change", function(e){
    var t = e.target; if (!t || !t.getAttribute) return;
    var d = t.getAttribute("data-date");
    if (d){ state.dates[d]=t.value; render(); return; }
    var bd = t.getAttribute("data-bdate");
    if (bd){ state.bookingForm[bd==="in"?"dateIn":"dateOut"]=t.value; return; }
    var bk = t.getAttribute("data-booking");
    if (bk){ state.bookingForm[bk]=t.value; return; }
  });
  document.addEventListener("keydown", function(e){
    if (e.key==="Enter" && !state.unlocked){ tryUnlock(); }
  });

  render();
  var sp = document.getElementById("splash");
  if (sp){ sp.style.opacity="0"; setTimeout(function(){ if(sp.parentNode) sp.parentNode.removeChild(sp); }, 480); }
})();
</script>
<script>
  /* Register the service worker for offline use — no-ops where unsupported. */
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", function(){
      navigator.serviceWorker.register("sw.js").catch(function(){});
    });
  }
</script>
