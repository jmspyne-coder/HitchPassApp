# Codemagic CI — builds the Hitch Pass iOS app (Capacitor wrapper in /mobile)
# Signing: created automatically from the App Store Connect API key (Admin access),
# so no manual certificate/profile setup is needed.
workflows:
  ios-hitchpass:
    name: Hitch Pass iOS
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: HitchPass ASC API Key
    environment:
      vars:
        BUNDLE_ID: "app.hitchpass.mobile"
      node: 20
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install Capacitor deps
        script: |
          cd mobile
          npm install
      - name: Generate & sync the iOS project
        script: |
          cd mobile
          npx cap add ios 2>/dev/null || true
          npx cap sync ios
      - name: Initialize keychain
        script: keychain initialize
      - name: Generate a private key for the signing certificate
        script: openssl genrsa -out /tmp/cert_key.pem 2048
      - name: Create/fetch signing certificate + provisioning profile
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key=@file:/tmp/cert_key.pem \
            --create
      - name: Add signing certificate to keychain
        script: keychain add-certificates --certificate-key=@file:/tmp/cert_key.pem
      - name: Apply provisioning profiles to the Xcode project
        script: |
          cd mobile/ios/App
          xcode-project use-profiles
      - name: Install CocoaPods
        script: |
          cd mobile/ios/App
          pod install
      - name: Build IPA
        script: |
          cd mobile/ios/App
          xcode-project build-ipa \
            --workspace "App.xcworkspace" \
            --scheme "App"
    artifacts:
      - mobile/ios/App/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
