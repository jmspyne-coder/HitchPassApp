# Codemagic CI — builds the Hitch Pass iOS app (Capacitor wrapper in /mobile)
# Prereqs (in Codemagic UI before first successful publish):
#   1. Apple Developer Program enrolled ($99/yr).
#   2. App Store Connect API key added in Codemagic → Teams/Integrations → "HitchPass ASC API Key".
#   3. Bundle ID "app.hitchpass.mobile" registered (Codemagic can auto-register with the API key).
#   4. An app record created in App Store Connect for that bundle ID.
workflows:
  ios-hitchpass:
    name: Hitch Pass iOS
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: HitchPass ASC API Key
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: app.hitchpass.mobile
      vars:
        BUNDLE_ID: "app.hitchpass.mobile"
      node: 20
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install Capacitor deps
        script: |
          cd mobile
          npm install
      - name: Generate & sync the iOS project
        script: |
          cd mobile
          npx cap add ios 2>/dev/null || true
          npx cap sync ios
      - name: Set bundle id + version
        script: |
          cd mobile/ios/App
          # set marketing/build version from Codemagic's incrementing counter
          agvtool new-version -all $(($BUILD_NUMBER + 1)) || true
      - name: Set up code signing
        script: |
          cd mobile/ios/App
          xcode-project use-profiles
      - name: Install CocoaPods
        script: |
          cd mobile/ios/App
          pod install
      - name: Build IPA
        script: |
          cd mobile/ios/App
          xcode-project build-ipa \
            --workspace "App.xcworkspace" \
            --scheme "App"
    artifacts:
      - mobile/ios/App/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
